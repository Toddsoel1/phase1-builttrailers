<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Built Trailers — Phase 1 (Live)</title>
<style>
:root{--bg:#0f1419;--panel:#161c24;--panel2:#1d2630;--line:#2a3540;--txt:#e7edf3;--muted:#8b9aa8;--accent:#ff7a18;--green:#3ecf8e;--red:#ff5d5d;--yellow:#ffd166;--blue:#5aa9ff;--mfg:#ba7dff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
.hidden{display:none!important}
.app{display:flex;min-height:100vh}
.sidebar{width:215px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:18px;border-bottom:1px solid var(--line)}.brand h1{font-size:16px}.brand .t{color:var(--accent)}.brand small{color:var(--muted);font-size:11px}
.nav{padding:10px 8px;flex:1}.nav button{width:100%;text-align:left;background:none;border:none;color:var(--muted);padding:10px 12px;border-radius:8px;font-size:13.5px;margin-bottom:2px}
.nav button:hover{background:var(--panel2);color:var(--txt)}.nav button.active{background:linear-gradient(90deg,rgba(255,122,24,.18),transparent);color:var(--txt);font-weight:600;box-shadow:inset 3px 0 0 var(--accent)}
.who{padding:12px;border-top:1px solid var(--line);font-size:12px}.who b{display:block;margin:3px 0}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;text-transform:uppercase}
.pill.admin{background:rgba(255,122,24,.2);color:#ffb347}.pill.editor{background:rgba(90,169,255,.2);color:var(--blue)}.pill.viewer{background:rgba(139,154,168,.2);color:var(--muted)}
.main{flex:1;min-width:0}.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:10}
.topbar h2{font-size:18px}.topbar .sub{color:var(--muted);font-size:12px}
.content{padding:20px 22px}
.grid{display:grid;gap:14px}.g4{grid-template-columns:repeat(4,1fr)}@media(max-width:1000px){.g4{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.card h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.kpi .v{font-size:26px;font-weight:700}.kpi .s{font-size:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px;border-bottom:1px solid var(--line)}
td{padding:8px;border-bottom:1px solid var(--panel2)}tr:hover td{background:var(--panel2)}.right{text-align:right}.center{text-align:center}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}.b-ok{background:rgba(62,207,142,.15);color:var(--green)}.b-low{background:rgba(255,209,102,.15);color:var(--yellow)}.b-below{background:rgba(255,93,93,.15);color:var(--red)}
.b-buy{background:rgba(90,169,255,.15);color:var(--blue)}.b-mfg{background:rgba(186,125,255,.15);color:var(--mfg)}
.btn{background:var(--accent);color:#1a1206;border:none;padding:8px 14px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}.btn.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}.btn.sm{padding:4px 9px;font-size:12px}
input,select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:8px;font-size:13px;font-family:inherit}
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;padding:20px}
.login .box{max-width:840px;width:100%;display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:16px;overflow:hidden}
@media(max-width:760px){.login .box{grid-template-columns:1fr}}
.login .l{padding:32px;background:var(--panel)}.login .r{padding:22px;background:var(--panel2);max-height:520px;overflow:auto}
.login .field{margin-bottom:12px}.login label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.login input{width:100%}
.err{color:var(--red);font-size:13px;min-height:18px}
a.lnk{color:var(--blue);cursor:pointer}
.banner{background:linear-gradient(100deg,rgba(62,207,142,.12),transparent);border:1px solid rgba(62,207,142,.3);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border-left:4px solid var(--accent);border:1px solid var(--accent);border-radius:9px;padding:11px 15px;z-index:200}
.kanban{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:start}@media(max-width:1200px){.kanban{grid-template-columns:repeat(3,1fr)}}
.col{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px;min-height:80px}
.col h4{font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;justify-content:space-between}
.col.over{border-color:var(--accent);background:var(--panel2)}
.ocard{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px;margin-bottom:7px;cursor:grab;font-size:12px}
.ocard .t{display:flex;justify-content:space-between;font-weight:700;margin-bottom:2px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}.tabs button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer}.tabs button.active{background:var(--accent);color:#1a1206;font-weight:700}
.field{margin-bottom:12px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.field input,.field select,.field textarea{width:100%}
.row{display:flex;gap:12px}.row>*{flex:1}
.chip{display:inline-block;border:1px solid var(--line);border-radius:20px;padding:4px 10px;font-size:12px;margin:2px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:150;padding:20px}.modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:540px;width:100%;max-height:86vh;overflow:auto}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:860px){.split{grid-template-columns:1fr}}
</style>
</head>
<body>
<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <div class="l">
      <h1 style="font-size:22px">BUILT <span style="color:var(--accent)">TRAILERS</span></h1>
      <div style="color:var(--muted);margin-bottom:20px;font-size:13px">Phase 1 — live hosted environment</div>
      <div class="field"><label>Username</label><input id="liUser" autocomplete="username"></div>
      <div class="field"><label>Password</label><input id="liPass" type="password" autocomplete="current-password"></div>
      <div class="err" id="liErr"></div>
      <button class="btn" style="width:100%" onclick="login()">Sign in</button>
      <p style="color:var(--muted);font-size:11px;margin-top:12px">Secure auth: passwords are bcrypt-hashed in the database; sessions use JWT.</p>
    </div>
    <div class="r">
      <h3 style="font-size:12px;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Demo accounts (click to fill)</h3>
      <div style="color:var(--muted);font-size:12px;margin-bottom:8px">Password for all: <b>built2026</b></div>
      <table id="acctList"><tbody></tbody></table>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app hidden" id="app">
  <aside class="sidebar">
    <div class="brand"><h1>BUILT <span class="t">TRAILERS</span></h1><small>Phase 1 · live</small></div>
    <nav class="nav" id="nav"></nav>
    <div class="who"><div class="muted">Signed in as</div><b id="whoName"></b><span id="whoPill"></span>
      <button class="btn sec sm" style="width:100%;margin-top:8px" onclick="logout()">Log out</button></div>
  </aside>
  <main class="main">
    <div class="topbar"><div><h2 id="pTitle">Dashboard</h2><div class="sub" id="pSub"></div></div><div id="pActions"></div></div>
    <div class="content" id="content"></div>
  </main>
</div>
<div id="toast"></div>

<script>
const API = '';
let TOKEN = null, ME = null, page = 'dashboard';
const $ = id => document.getElementById(id);
const money = n => '$' + Math.round(n).toLocaleString();
const money2 = n => '$' + (Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;$('toast').appendChild(t);setTimeout(()=>t.remove(),3000);}
async function api(path, opts={}){
  const h = {'Content-Type':'application/json'};
  if(TOKEN) h.Authorization='Bearer '+TOKEN;
  const r = await fetch(API+path,{...opts,headers:h});
  if(r.status===401){logout();throw new Error('Session expired');}
  const d = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(d.error||('HTTP '+r.status));
  return d;
}
const canEdit = () => ME && (ME.role==='admin'||ME.role==='editor');
const isAdmin = () => ME && ME.role==='admin';
const canSell = () => ME && (ME.role==='admin' || ['Sales','Rep Specialist','General Manager'].includes(ME.title));

// ---- login ----
async function loadAccts(){
  // public hint list (names only) — fetched after we know usernames via a tiny unauthenticated call is not available,
  // so we show the known seed accounts statically for the demo.
  const seed=[['tsoelberg','Todd Soelberg','General Manager','admin'],['mchen','Maria Chen','Shop Manager','admin'],
   ['dolsen','Dave Olsen','Office Manager','admin'],['aruiz','Angela Ruiz','Sales','editor'],
   ['creyes','Carlos Reyes','Boat Lead','editor'],['rmendez','Rosa Mendez','QC Specialist','editor'],
   ['ilender','Investor / Lender','External Viewer','viewer']];
  $('acctList').querySelector('tbody').innerHTML = seed.map(s=>`<tr style="cursor:pointer" onclick="document.getElementById('liUser').value='${s[0]}';document.getElementById('liPass').value='built2026'"><td><b>${s[0]}</b></td><td class="muted">${s[1]}</td><td><span class="pill ${s[3]}">${s[2]}</span></td></tr>`).join('');
}
async function login(){
  try{
    const d = await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:$('liUser').value.trim(),password:$('liPass').value})});
    TOKEN=d.token;ME=d.user;$('login').classList.add('hidden');$('app').classList.remove('hidden');page='dashboard';render();toast('Welcome, '+ME.name.split(' ')[0]+'!');
  }catch(e){$('liErr').textContent=e.message;}
}
function logout(){TOKEN=null;ME=null;$('app').classList.add('hidden');$('login').classList.remove('hidden');}
$('liPass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});

// ---- nav/render ----
const NAV=[['dashboard','📊 Dashboard'],['orders','📋 Orders & Fulfillment'],['neworder','➕ New Order'],['customers','🏬 Customers & Dealers'],['parts','📦 Parts Master'],['predict','🤖 Predictive Ordering'],['pos','🧾 Purchase Orders'],['boms','🧩 BOMs & Cost'],['inventory','📈 Inventory Value'],['accounting','💵 Accounting'],['team','👷 Team & Payroll'],['timeoff','📅 Schedule & Time Off'],['outcomes','🎯 Goals & Outcomes'],['wins','🎉 Wins'],['forecast','🔮 Forecasting & Planning'],['notify','💬 Notifications'],['users','👤 Users & Roles']];
function navVisible(n){ if(n[0]==='users') return isAdmin(); if(n[0]==='neworder') return canSell(); return true; }
function renderNav(){
  $('nav').innerHTML=NAV.filter(navVisible).map(n=>`<button class="${page===n[0]?'active':''}" onclick="go('${n[0]}')">${n[1]}</button>`).join('');
  $('whoName').textContent=ME.name;
  $('whoPill').innerHTML=`<span class="pill ${ME.role}">${ME.title||ME.role}</span>`;
}
function go(p){page=p;render();}
async function render(){
  renderNav();
  const map={dashboard:viewDash,orders:viewOrders,neworder:viewNewOrder,customers:viewCustomers,parts:viewParts,predict:viewPredict,pos:viewPOs,boms:viewBoms,inventory:viewInv,accounting:viewAccounting,team:viewTeam,timeoff:viewTimeoff,outcomes:viewOutcomes,wins:viewWins,forecast:viewForecast,notify:viewNotify,users:viewUsers};
  try{ await (map[page]||viewDash)(); }catch(e){ $('content').innerHTML=`<div class="card">Error: ${e.message}</div>`; }
}
function kpi(t,v,s){return `<div class="card kpi"><h3>${t}</h3><div class="v">${v}</div><div class="s">${s}</div></div>`;}

async function viewDash(){
  $('pTitle').textContent='Dashboard';$('pSub').textContent='Phase 1 — single source of truth (live from the database)';$('pActions').innerHTML='';
  const [inv,models]=await Promise.all([api('/api/inventory/summary'),api('/api/models')]);
  const avgMargin=models.reduce((s,m)=>s+m.margin,0)/models.length*100;
  $('content').innerHTML=`
   <div class="banner">✅ Connected to the live API and database. Every figure below is computed server-side from stored data.</div>
   <div class="grid g4">
    ${kpi('Inventory value',money(inv.totalValue),inv.skuCount+' SKUs on hand')}
    ${kpi('Trailer models',models.length,inv.manufactured+' make / '+inv.purchased+' buy parts')}
    ${kpi('Avg gross margin',avgMargin.toFixed(1)+'%','across all models')}
    ${kpi('Below reorder',inv.belowReorder,'parts need attention')}
   </div>
   <div class="card" style="margin-top:16px"><h3>Model cost & margin</h3>
   <table><thead><tr><th>Model</th><th>Category</th><th class="right">Material</th><th class="right">Labor</th><th class="right">Total cost</th><th class="right">Price</th><th class="right">Margin</th></tr></thead><tbody>
   ${models.map(m=>`<tr><td><b>${m.id}</b> ${m.name}</td><td>${m.category}</td><td class="right">${money(m.material)}</td><td class="right">${money(m.laborCost)}</td><td class="right"><b>${money(m.totalCost)}</b></td><td class="right">${money(m.price)}</td><td class="right" style="color:${m.margin<0?'var(--red)':m.margin>.3?'var(--green)':'var(--yellow)'}">${(m.margin*100).toFixed(1)}%</td></tr>`).join('')}
   </tbody></table></div>`;
}

async function viewParts(){
  $('pTitle').textContent='Parts Master';$('pSub').textContent='Live parts, costs and on-hand — '+(canEdit()?'click a cost to edit':'read-only');$('pActions').innerHTML='';
  const parts=await api('/api/parts');
  $('content').innerHTML=`<div class="card"><h3>Parts (${parts.length})</h3>
   <table><thead><tr><th>Part</th><th>Type</th><th>Vendor</th><th class="right">On hand</th><th class="right">Reorder</th><th class="right">Unit cost</th><th class="right">Ext. value</th><th class="center">Status</th>${canEdit()?'<th></th>':''}</tr></thead><tbody>
   ${parts.map(p=>`<tr>
     <td><b>${p.id}</b><br><span class="muted" style="font-size:11px">${p.name}</span></td>
     <td>${p.type==='M'?'<span class="badge b-mfg">MAKE</span>':'<span class="badge b-buy">BUY</span>'}</td>
     <td style="font-size:12px">${p.vendor||''}</td>
     <td class="right">${p.onHand}</td><td class="right">${p.reorder}</td>
     <td class="right">${canEdit()?`<a class="lnk" onclick="editCost('${p.id}',${p.cost})">${money2(p.cost)}</a>`:money2(p.cost)}</td>
     <td class="right">${money(p.extValue)}</td>
     <td class="center"><span class="badge ${p.status==='ok'?'b-ok':p.status==='low'?'b-low':'b-below'}">${p.status}</span></td>
     ${canEdit()?`<td class="right"><button class="btn sm sec" onclick="receive('${p.id}')">Receive</button></td>`:''}
   </tr>`).join('')}
   </tbody></table></div>`;
}
async function editCost(id,cur){
  const v=prompt('New unit cost for '+id+':',cur);if(v==null)return;
  await api('/api/parts/'+id,{method:'PATCH',body:JSON.stringify({cost:Number(v)})});
  toast('Cost updated — BOMs recalculated.');render();
}
async function receive(id){
  const v=prompt('Quantity received for '+id+':','10');if(v==null)return;
  await api('/api/parts/'+id+'/receive',{method:'POST',body:JSON.stringify({qty:Number(v)})});
  toast('Received '+v+' '+id+'.');render();
}

async function viewBoms(){
  $('pTitle').textContent='BOMs & Cost';$('pSub').textContent='Per-model bill of materials with live cost rollup';$('pActions').innerHTML='';
  const models=await api('/api/models');
  const cats=[...new Set(models.map(m=>m.category))];
  $('content').innerHTML=`<div style="max-width:460px;margin-bottom:14px"><select id="bomSel" onchange="showBom(this.value)" style="width:100%">
    ${cats.map(c=>`<optgroup label="${c}">${models.filter(m=>m.category===c).map(m=>`<option value="${m.id}">${m.id} — ${m.name}</option>`).join('')}</optgroup>`).join('')}
   </select></div><div id="bomBody"></div>`;
  showBom(models[0].id);
}
async function showBom(id){
  const m=await api('/api/models/'+id);
  $('bomBody').innerHTML=`
   <div class="grid g4" style="margin-bottom:14px">
    ${kpi('Material',money(m.material),'parts')}
    ${kpi('Labor',money(m.laborCost),m.laborHrs.toFixed(1)+' hrs @ $'+m.labor[0]?.rate)}
    ${kpi('Total cost',money(m.totalCost),'per unit')}
    ${kpi('Margin',(m.margin*100).toFixed(1)+'%',money(m.marginDollars)+' on '+money(m.price))}
   </div>
   <div class="card"><h3>${m.name} — Bill of Materials</h3>
   <table><thead><tr><th>Part</th><th class="right">Qty</th><th class="right">Unit</th><th class="right">Ext.</th></tr></thead><tbody>
   ${m.bom.map(b=>`<tr><td>${b.name} ${b.type==='M'?'<span class="badge b-mfg">MAKE</span>':''}</td><td class="right">${b.qty}</td><td class="right">${money2(b.unitCost)}</td><td class="right">${money2(b.ext)}</td></tr>`).join('')}
   <tr><td colspan="3" class="right"><b>Material</b></td><td class="right"><b>${money2(m.material)}</b></td></tr>
   </tbody></table></div>
   <div class="card" style="margin-top:14px"><h3>Labor routing</h3>
   <table><thead><tr><th>Workstation</th><th class="right">Hours</th><th class="right">$/hr</th><th class="right">Ext.</th></tr></thead><tbody>
   ${m.labor.map(l=>`<tr><td>${l.ws}</td><td class="right">${l.hours}</td><td class="right">${money2(l.rate)}</td><td class="right">${money2(l.ext)}</td></tr>`).join('')}
   <tr><td colspan="3" class="right"><b>Labor</b></td><td class="right"><b>${money2(m.laborCost)}</b></td></tr>
   </tbody></table></div>`;
}

async function viewInv(){
  $('pTitle').textContent='Inventory Value';$('pSub').textContent='Live valuation of all parts on hand';$('pActions').innerHTML='';
  const [inv,parts]=await Promise.all([api('/api/inventory/summary'),api('/api/parts')]);
  const top=parts.slice().sort((a,b)=>b.extValue-a.extValue).slice(0,15);
  $('content').innerHTML=`<div class="grid g4">
    ${kpi('Total inventory value',money(inv.totalValue),'at current unit costs')}
    ${kpi('SKUs',inv.skuCount,inv.purchased+' buy / '+inv.manufactured+' make')}
    ${kpi('Below reorder',inv.belowReorder,'need replenishment')}
    ${kpi('Make vs buy',inv.manufactured+' / '+inv.purchased,'manufactured / purchased')}
   </div>
   <div class="card" style="margin-top:16px"><h3>Top 15 parts by value on hand</h3>
   <table><thead><tr><th>Part</th><th class="right">On hand</th><th class="right">Unit cost</th><th class="right">Ext. value</th></tr></thead><tbody>
   ${top.map(p=>`<tr><td><b>${p.id}</b> ${p.name}</td><td class="right">${p.onHand}</td><td class="right">${money2(p.cost)}</td><td class="right">${money(p.extValue)}</td></tr>`).join('')}
   </tbody></table></div>`;
}

async function viewUsers(){
  $('pTitle').textContent='Users & Roles';$('pSub').textContent='Accounts, permission tiers and reporting hierarchy';$('pActions').innerHTML='';
  const users=await api('/api/users');
  const byId=Object.fromEntries(users.map(u=>[u.id,u]));
  $('content').innerHTML=`<div class="card"><h3>Users (${users.length})</h3>
   <table><thead><tr><th>Name</th><th>Username</th><th>Role</th><th class="center">Tier</th><th>Manager</th></tr></thead><tbody>
   ${users.map(u=>`<tr><td><b>${u.name}</b></td><td>${u.username}</td><td>${u.title||''}</td><td class="center"><span class="pill ${u.role}">${u.role}</span></td><td class="muted">${u.manager_id?byId[u.manager_id]?.name||'':'—'}</td></tr>`).join('')}
   </tbody></table>
   <p class="muted" style="font-size:12px;margin-top:8px">Passwords are bcrypt-hashed; permission tiers are enforced on every API call.</p></div>`;
}

// ============ PHASE 2: ORDERS / FULFILLMENT / DEALERS ============
function modal(title,html){const d=document.createElement('div');d.className='modal-bg';d.id='modalBg';d.onclick=e=>{if(e.target===d)d.remove();};d.innerHTML=`<div class="modal"><h2 style="margin-bottom:14px">${title}</h2>${html}</div>`;document.body.appendChild(d);}
function closeModal(){const m=$('modalBg');if(m)m.remove();}

let ordFilter='All';
async function viewOrders(){
  $('pTitle').textContent='Orders & Fulfillment';$('pSub').textContent='Pipeline by trailer type — '+(canEdit()?'drag a card to change its stage':'read-only');
  $('pActions').innerHTML=canSell()?`<button class="btn" onclick="go('neworder')">➕ New Order</button>`:'';
  const {stages,orders}=await api('/api/orders');
  const types=['All',...Array.from(new Set(orders.map(o=>o.type)))];
  const filtered=ordFilter==='All'?orders:orders.filter(o=>o.type===ordFilter);
  const tabs=`<div class="tabs">${types.map(t=>`<button class="${ordFilter===t?'active':''}" onclick="ordFilter='${t}';viewOrders()">${t}<span style="opacity:.7;margin-left:5px">${t==='All'?orders.length:orders.filter(o=>o.type===t).length}</span></button>`).join('')}</div>`;
  const board=`<div class="kanban">${stages.map(st=>`

async function viewPredict(){

  $('pActions').innerHTML=(canEdit()&&act.some(r=>r.type==='P'))?`<button class="btn" onclick="autoPO()">⚡ Auto-generate all POs</button>`:'';
  $('content').innerHTML=`
   <div class="banner">🤖 Demand-weighted reorder model with lead-time safety stock. Inputs: open orders, per-model daily capacity, vendor lead times, cushion stock. <b>${summary.critical}</b> critical · <b>${summary.warning}</b> reorder-soon · <b>${summary.ok}</b> healthy.</div>
   ${act.length?`<div class="card"><h3>Recommended actions (${act.length})</h3>
   <table><thead><tr><th>Part</th><th class="right">On hand</th><th class="right">On order</th><th class="right">Demand</th><th class="right">Days cover</th><th class="right">Lead</th><th class="right">Suggest</th><th>Order by</th><th class="center">Action</th>${canEdit()?'<th></th>':''}</tr></thead><tbody>
   ${act.map(r=>`<tr>
     <td><b>${r.id}</b> <span class="muted">${r.name}</span></td>
     <td class="right">${r.onHand}</td><td class="right">${r.onOrder||''}</td><td class="right">${r.demand||''}</td>
     <td class="right" style="color:${(r.daysCover!=null&&r.daysCover<r.lead)?'var(--red)':'var(--yellow)'}">${r.daysCover!=null?r.daysCover+'d':'—'}</td>
     <td class="right">${r.type==='M'?'build':r.lead+'d'}</td>
     <td class="right"><b>${r.suggestQty}</b></td>
     <td>${r.orderBy}</td>
     <td class="center"><span class="badge ${r.sev==='crit'?'b-below':'b-low'}">${r.action}</span></td>
     ${canEdit()?`<td class="right">${r.type==='M'?`<span class="muted" style="font-size:11px">build order</span>`:`<button class="btn sm" onclick="makePO('${r.id}',${r.suggestQty})">Create PO</button>`}</td>`:''}
   </tr>`).join('')}
   </tbody></table></div>`:'<div class="card"><div class="banner">✅ No action needed — every part has coverage beyond its lead time plus cushion.</div></div>'}
   <div class="card" style="margin-top:16px"><h3>How a recommendation is computed</h3>
   <p class="muted">Projected on-hand = current + open POs − demand from open orders. We compare days-of-coverage (on-hand ÷ daily consumption from production capacity) against vendor lead time + safety days. If coverage is thin, the suggested quantity rounds up to the vendor's lot size to refill past the reorder+cushion line and cover consumption during the lead window — so you reorder early enough to never run out.</p></div>`;
}

function sparkline(hist,fc){
  const all=[...hist,...fc];const max=Math.max(1,...all);const W=240,H=44,n=all.length;
  const pts=all.map((v,i)=>`${(i/(n-1)*W).toFixed(1)},${(H-v/max*H).toFixed(1)}`).join(' ');
  const split=((hist.length-1)/(n-1)*W).toFixed(1);
  return `<svg width="${W}" height="${H}" style="overflow:visible"><polyline points="${pts}" fill="none" stroke="#5aa9ff" stroke-width="2"/><line x1="${split}" y1="0" x2="${split}" y2="${H}" stroke="var(--line)" stroke-dasharray="3 3"/></svg>`;
}
