<style>
:root{--bg:#0f1419;--panel:#161c24;--panel2:#1d2630;--line:#2a3540;--txt:#e7edf3;--muted:#8b9aa8;--accent:#ff7a18;--green:#3ecf8e;--red:#ff5d5d;--yellow:#ffd166;--blue:#5aa9ff;--mfg:#ba7dff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
.hidden{display:none!important}
.app{display:flex;min-height:100vh}
.sidebar{width:215px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:18px;border-bottom:1px solid var(--line)}.brand h1{font-size:16px}.brand .t{color:var(--accent)}.brand small{color:var(--muted);font-size:11px}
.nav{padding:10px 8px;flex:1}.nav button{width:100%;text-align:left;background:none;border:none;color:var(--muted);padding:10px 12px;border-radius:8px;font-size:13.5px;margin-bottom:2px}
.nav button:hover{background:var(--panel2);color:var(--txt)}.nav button.active{background:linear-gradient(90deg,rgba(255,122,24,.18),transparent);color:var(--txt);font-weight:600;box-shadow:inset 3px 0 0 var(--accent)}
.who{padding:12px;border-top:1px solid var(--line);font-size:12px}.who b{display:block;margin:3px 0}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;text-transform:uppercase}
.pill.admin{background:rgba(255,122,24,.2);color:#ffb347}.pill.editor{background:rgba(90,169,255,.2);color:var(--blue)}.pill.viewer{background:rgba(139,154,168,.2);color:var(--muted)}
.main{flex:1;min-width:0}.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:10}
.topbar h2{font-size:18px}.topbar .sub{color:var(--muted);font-size:12px}
.content{padding:20px 22px}
.grid{display:grid;gap:14px}.g4{grid-template-columns:repeat(4,1fr)}@media(max-width:1000px){.g4{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.card h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.kpi .v{font-size:26px;font-weight:700}.kpi .s{font-size:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px;border-bottom:1px solid var(--line)}
td{padding:8px;border-bottom:1px solid var(--panel2)}tr:hover td{background:var(--panel2)}.right{text-align:right}.center{text-align:center}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}.b-ok{background:rgba(62,207,142,.15);color:var(--green)}.b-low{background:rgba(255,209,102,.15);color:var(--yellow)}.b-below{background:rgba(255,93,93,.15);color:var(--red)}
.b-buy{background:rgba(90,169,255,.15);color:var(--blue)}.b-mfg{background:rgba(186,125,255,.15);color:var(--mfg)}
.btn{background:var(--accent);color:#1a1206;border:none;padding:8px 14px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}.btn.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}.btn.sm{padding:4px 9px;font-size:12px}
input,select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:8px;font-size:13px;font-family:inherit}
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;padding:20px}
.login .box{max-width:430px;width:100%;display:grid;grid-template-columns:1fr;border:1px solid var(--line);border-radius:16px;overflow:hidden}
@media(max-width:760px){.login .box{grid-template-columns:1fr}}
.login .l{padding:32px;background:var(--panel)}.login .r{padding:22px;background:var(--panel2);max-height:520px;overflow:auto}
.login .field{margin-bottom:12px}.login label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.login input{width:100%}
.err{color:var(--red);font-size:13px;min-height:18px}
a.lnk{color:var(--blue);cursor:pointer}
.banner{background:linear-gradient(100deg,rgba(62,207,142,.12),transparent);border:1px solid rgba(62,207,142,.3);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border-left:4px solid var(--accent);border:1px solid var(--accent);border-radius:9px;padding:11px 15px;z-index:200}
.kanban{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:start}@media(max-width:1200px){.kanban{grid-template-columns:repeat(3,1fr)}}
.col{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px;min-height:80px}
.col h4{font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;justify-content:space-between}
.col.over{border-color:var(--accent);background:var(--panel2)}
.ocard{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px;margin-bottom:7px;cursor:grab;font-size:12px}
.ocard .t{display:flex;justify-content:space-between;font-weight:700;margin-bottom:2px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}.tabs button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer}.tabs button.active{background:var(--accent);color:#1a1206;font-weight:700}
.field{margin-bottom:12px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.field input,.field select,.field textarea{width:100%}
.rolesel{border:1px solid var(--line);border-radius:8px;background:var(--panel2);overflow:hidden}
.rolesel-head{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;font-size:13px;color:var(--txt)}
.rolesel-head .ph{color:var(--muted)}
.rolesel-list{border-top:1px solid var(--line);max-height:220px;overflow-y:auto;background:var(--panel)}
.rolesel-item{display:flex;align-items:center;gap:8px;padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--line);font-size:13px}
.rolesel-item:last-child{border-bottom:none}.rolesel-item:hover{background:var(--panel2)}
.rolesel-item input{width:auto;margin:0}
.row{display:flex;gap:12px}.row>*{flex:1}
.chip{display:inline-block;border:1px solid var(--line);border-radius:20px;padding:4px 10px;font-size:12px;margin:2px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:150;padding:20px}.modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:540px;width:100%;max-height:86vh;overflow:auto}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:860px){.split{grid-template-columns:1fr}}
</style>
</head>
<body>
<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <div class="l">
      <h1 style="font-size:22px">BUILT <span style="color:var(--accent)">TRAILERS</span></h1>
      <div style="color:var(--muted);margin-bottom:20px;font-size:13px">Phase 1 — live hosted environment</div>
      <div class="field"><label>Username</label><input id="liUser" autocomplete="username"></div>
      <div class="field"><label>Password</label><input id="liPass" type="password" autocomplete="current-password"></div>
      <div class="err" id="liErr"></div>
      <button class="btn" style="width:100%" onclick="login()">Sign in</button>
      <p style="color:var(--muted);font-size:11px;margin-top:12px">Secure auth: passwords are bcrypt-hashed in the database; sessions use JWT.</p>
      <button class="btn sec installBtn" style="width:100%;margin-top:14px;display:none" onclick="promptInstall()">📲 Install app on your phone</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app hidden" id="app">
  <aside class="sidebar">
    <div class="brand"><h1>BUILT <span class="t">TRAILERS</span></h1><small>Phase 1 · live</small></div>
    <nav class="nav" id="nav"></nav>
    <div class="who"><div class="muted">Signed in as</div><b id="whoName"></b><span id="whoPill"></span>
      <button class="btn sec sm" id="pushBtn" style="width:100%;margin-top:8px" onclick="enablePush('/api/push/subscribe')">🔔 Enable notifications</button>
      <button class="btn sec sm" style="width:100%;margin-top:6px" onclick="logout()">Log out</button></div>
  </aside>
  <main class="main">
    <div class="topbar"><div><h2 id="pTitle">Dashboard</h2><div class="sub" id="pSub"></div></div><div id="pActions"></div></div>
    <div class="content" id="content"></div>
  </main>
</div>
<div id="toast"></div>

<script>
const API = window.location.origin;
let TOKEN = null, ME = null, page = 'dashboard';
const $ = id => document.getElementById(id);
const money = n => '$' + Math.round(n).toLocaleString();
const money2 = n => '$' + (Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
// Escape user-supplied strings before inserting into innerHTML
function esc(s){ const d=document.createElement('div');d.textContent=String(s??'');return d.innerHTML; }
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;$('toast').appendChild(t);setTimeout(()=>t.remove(),3000);}
async function api(path, opts={}){
  // Accept:json is required — without it, endpoints that content-negotiate (e.g.
  // /api/auth/qbo) fall back to a 302 redirect, which fetch follows cross-origin and
  // dies with "Failed to fetch". Every api() response is parsed as JSON anyway.
  const h = {'Content-Type':'application/json','Accept':'application/json'};
  if(TOKEN) h.Authorization='Bearer '+TOKEN;
  const r = await fetch(API+path,{...opts,headers:h});
  const d = await r.json().catch(()=>({}));
  if(r.status===401 && d.qboReconnectRequired){const e=new Error(d.error);e.qboReconnectRequired=true;throw e;}
  if(r.status===401){logout();throw new Error('Session expired');}
  if(r.status===402 && d.qboFeatureUnavailable){const e=new Error(d.error);e.qboFeatureUnavailable=true;throw e;}
  if(!r.ok) throw new Error(d.error||('HTTP '+r.status));
  return d;
}
const canEdit = () => ME && (ME.role==='admin'||ME.role==='editor');
const isAdmin = () => ME && ME.role==='admin';
// All job titles the signed-in user holds (multi-role), with fallback to the primary title.
const myTitles = () => (ME && (ME.titles&&ME.titles.length?ME.titles:(ME.title?[ME.title]:[]))) || [];
const hasTitle = (...names) => myTitles().some(t=>names.includes(t));
const canSell = () => ME && (ME.role==='admin' || hasTitle('Sales','Rep Specialist','General Manager'));

// ---- login ----
async function login(){
  try{
    const d = await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:$('liUser').value.trim(),password:$('liPass').value})});
    TOKEN=d.token;ME=d.user;$('login').classList.add('hidden');$('app').classList.remove('hidden');page='dashboard';render();toast('Welcome, '+ME.name.split(' ')[0]+'!');
  }catch(e){$('liErr').textContent=e.message;}
}
function logout(){TOKEN=null;ME=null;$('app').classList.add('hidden');$('login').classList.remove('hidden');}
$('liPass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});

// ---- nav/render ----
const NAV=[['dashboard','📊 Dashboard'],['orders','🔨 Build'],['daily','📋 Daily Update'],['neworder','➕ New Order'],['customers','🏬 Customers & Dealers'],['parts','📦 Parts Master'],['predict','🤖 Predictive Ordering'],['pos','🧾 Purchase Orders'],['boms','🧩 BOMs & Cost'],['inventory','📈 Inventory Value'],['accounting','💵 Accounting'],['trailers','🚛 Trailers & Warranty'],['team','👷 Team & Payroll'],['timeoff','📅 Schedule & Time Off'],['outcomes','🎯 Goals & Outcomes'],['wins','🎉 Wins'],['forecast','🔮 Forecasting & Planning'],['notify','💬 Notifications'],['support','🆘 Support'],['users','👤 Users & Roles']];
function canSee(section){
  if(isAdmin()) return true;
  if(!ME.sections) return true; // null = all sections (admin)
  return ME.sections.includes(section);
}
function navVisible(n){
  if(n[0]==='users') return isAdmin();
  if(n[0]==='neworder') return canSell()&&canSee('neworder');
  return canSee(n[0]);
}
function renderNav(){
  $('nav').innerHTML=NAV.filter(navVisible).map(n=>`<button class="${page===n[0]?'active':''}" onclick="go('${n[0]}')">${n[1]}</button>`).join('');
  $('whoName').textContent=ME.name;
  $('whoPill').innerHTML=`<span class="pill ${ME.role}">${(ME.titles||[ME.title]).filter(Boolean).join(', ')||ME.role}</span>`;
}
function go(p){page=p;render();}
async function render(){
  renderNav();
  const map={dashboard:viewDash,orders:viewOrders,daily:viewDaily,neworder:viewNewOrder,customers:viewCustomers,parts:viewParts,predict:viewPredict,pos:viewPOs,boms:viewBoms,inventory:viewInv,accounting:viewAccounting,trailers:viewTrailers,team:viewTeam,timeoff:viewTimeoff,outcomes:viewOutcomes,wins:viewWins,forecast:viewForecast,notify:viewNotify,support:viewSupport,users:viewUsers};
  try{
    await (map[page]||viewDash)();
    const pa=$('pActions');
    if(pa&&!pa.querySelector('.help-btn')){
      pa.insertAdjacentHTML('beforeend',`<button class="btn sm sec help-btn" onclick="showHelp('${page}')" title="How to use this section" style="margin-left:6px">? Help</button>`);
    }
  }catch(e){ $('content').innerHTML=`<div class="card">Error: ${e.message}</div>`; }
}
function kpi(t,v,s){return `<div class="card kpi"><h3>${t}</h3><div class="v">${v}</div><div class="s">${s}</div></div>`;}

// ── In-app Help System ──────────────────────────────────────────────────────
const HELP={
  daily:{title:'📋 Daily Update',body:`
    <p>Where the shop floor logs what got done each day — <strong>by user and workstation</strong>. This is what keeps inventory and WIP value accurate.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">How it works</h4>
    <ul>
      <li>Pick the <strong>trailer</strong>, your <strong>workstation</strong>, the <strong>stage</strong>, and the <strong>hours</strong> you worked.</li>
      <li>Tick <strong>"completes the stage"</strong> when a stage is finished — the app consumes that stage's tagged materials, capitalizes them (plus standard labor) into the trailer's <strong>WIP value</strong>, and advances the trailer to the next stage.</li>
      <li>The <strong>daily summary</strong> shows hours and material consumed per workstation. <strong>Inventory Value</strong> shows live raw / WIP / finished totals.</li>
    </ul>`},
  dashboard:{title:'📊 Dashboard',body:`
    <p>Your daily command center. Everything here is <strong>read-only</strong> — it's a live snapshot of the business right now.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">What you're looking at</h4>
    <ul>
      <li><strong>Open Orders</strong> — count of orders at each stage (Quote → Ready)</li>
      <li><strong>Inventory Value</strong> — total on-hand parts × unit cost</li>
      <li><strong>Cash Flow</strong> — invoiced (AR) vs bills owed (AP)</li>
      <li><strong>Pending Approvals</strong> — POs and BOM changes waiting for sign-off</li>
      <li><strong>Recent Wins</strong> — latest team recognition posts</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Tips</h4>
    <ul>
      <li>Use the nav on the left to act on anything you see here</li>
      <li>Numbers refresh each time you navigate back to this page</li>
      <li>Red numbers = something needs attention (short inventory, pending approvals)</li>
    </ul>`},
  orders:{title:'🔨 Build',body:`
    <p>Tracks every sale from first quote through the build to invoicing.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Stages</h4>
    <ol>
      <li><strong>Quote</strong> — entered, not yet confirmed</li>
      <li><strong>Confirmed</strong> — customer committed, goes on the schedule</li>
      <li><strong>Scheduled</strong> — slotted into the production queue</li>
      <li><strong>Build</strong> — frame &amp; assembly underway</li>
      <li><strong>Paint/Powder Coat</strong> — paint, or outsourced powder coat</li>
      <li><strong>Finish</strong> — final assembly &amp; QC</li>
      <li><strong>Ready</strong> — complete, <em>waiting to invoice</em></li>
    </ol>
    <p>From a <strong>Ready</strong> order, click <strong>🧾 Invoice &amp; close</strong> — that posts the invoice, relieves inventory, and drops it off the board.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Moving an order</h4>
    <p>Drag a card between columns to change its stage. The <strong>Production Queue</strong> tab orders what's built first (Sales/managers can resequence).</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Parts availability</h4>
    <p>Open a card to see its BOM — green = enough on hand, red = shortage. Clear shortages via Predictive Ordering before moving into Build.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Who can do what</h4>
    <ul>
      <li><strong>Viewer</strong> — read-only</li>
      <li><strong>Editor / Admin</strong> — create orders, advance stages</li>
      <li><strong>Sales</strong> — invoice a Ready order</li>
    </ul>`},
  neworder:{title:'➕ New Order',body:`
    <p>Create a new sales order in three steps.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Step-by-step</h4>
    <ol>
      <li><strong>Select dealer / customer</strong> — only active, authorized accounts appear. If a customer is missing, add them in Customers &amp; Dealers first.</li>
      <li><strong>Select trailer model</strong> — the list filters to models that customer is authorized to order. If a model is greyed out or missing, go to Customers &amp; Dealers and authorize that type for this account.</li>
      <li><strong>Set quantity, delivery date, and optional notes</strong> → click <strong>Create Order</strong></li>
    </ol>
    <p>The new order starts at <strong>Quote</strong> stage. Move it to Confirmed once the customer commits.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Common problems</h4>
    <ul>
      <li><em>Customer not in list</em> → add them in Customers &amp; Dealers</li>
      <li><em>Model not available</em> → authorize that trailer type for the customer first</li>
      <li><em>Can't see this section</em> → your job title needs the "New Order" section enabled by an admin</li>
    </ul>`},
  customers:{title:'🏬 Customers & Dealers',body:`
    <p>Manages every account that can place orders — both dealers and retail customers.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Adding a customer</h4>
    <ol>
      <li>Click <strong>➕ Add customer</strong></li>
      <li>Enter name, contact name, phone, and type (Dealer or Retail)</li>
      <li>Save — they now appear in the New Order customer list</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Authorizing trailer types</h4>
    <p>Each customer can only order trailer models you authorize. On their row, click the trailer type chips to toggle authorization (highlighted = authorized). This controls what appears in the New Order form for that account.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">SMS consent</h4>
    <p>Before a customer can receive text notifications (order stage updates), you must record their phone number and SMS consent. Either:</p>
    <ul>
      <li>Admin records consent here with a phone number</li>
      <li>Or the customer texts START to +1 (435) 900-8198 themselves</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Customer types</h4>
    <ul>
      <li><strong>Dealer</strong> — buys in volume, B2B relationship, shown in blue</li>
      <li><strong>Retail</strong> — individual buyer, shown in orange</li>
    </ul>`},
  parts:{title:'📦 Parts Master',body:`
    <p>The master list of every component used in production. Part costs here drive BOM cost rollup and inventory valuation everywhere in the app.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Part types</h4>
    <ul>
      <li><strong>P (Purchase)</strong> — bought from a vendor; has a vendor and unit cost</li>
      <li><strong>M (Make)</strong> — manufactured in-house; cost comes from its own sub-BOM</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Key fields</h4>
    <ul>
      <li><strong>Unit cost</strong> — what one unit costs; update this when vendor prices change</li>
      <li><strong>On hand</strong> — current inventory quantity; updates automatically when POs are received</li>
      <li><strong>Reorder point</strong> — MRP alerts when on_hand drops below this</li>
      <li><strong>Cushion</strong> — buffer above the reorder point before MRP triggers a recommendation</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Updating a cost</h4>
    <ol>
      <li>Find the part in the table</li>
      <li>Click its row to edit</li>
      <li>Update <strong>Unit cost</strong> → Save</li>
    </ol>
    <p>Alternatively, scan a vendor invoice in Accounting — the OCR auto-updates costs from the invoice line items.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Status badges</h4>
    <ul>
      <li><span style="background:#2d5a2d;color:#4caf50;padding:1px 6px;border-radius:4px;font-size:11px">OK</span> — on hand ≥ reorder + cushion</li>
      <li><span style="background:#5a2d2d;color:#f44336;padding:1px 6px;border-radius:4px;font-size:11px">LOW</span> — on hand below reorder point</li>
    </ul>`},
  predict:{title:'🤖 Predictive Ordering (MRP)',body:`
    <p>Material Requirements Planning — calculates what to buy and how much, based on open orders and inventory levels.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">How MRP calculates</h4>
    <p>For each part: <strong>Total demand</strong> (open orders × BOM qty) − <strong>On hand</strong> − <strong>Cushion</strong> = <strong>Recommended order qty</strong></p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Reading the table</h4>
    <ul>
      <li><strong>On Hand</strong> — current inventory</li>
      <li><strong>Need</strong> — total required to fulfill all open orders</li>
      <li><strong>Suggest</strong> — recommended PO quantity</li>
      <li>Red row = already below reorder point right now</li>
      <li>Orange row = will go short when open orders are fulfilled</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Creating a PO from recommendations</h4>
    <ol>
      <li>Check the boxes next to parts you want to order</li>
      <li>Click <strong>Create PO from selection</strong></li>
      <li>Review the draft PO (adjust quantities or prices if needed)</li>
      <li>Submit — it enters the approval workflow if over the threshold</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Tips</h4>
    <ul>
      <li>MRP only uses confirmed + in-production orders — quotes don't affect calculations</li>
      <li>If a part has no BOM association it won't appear here — add it to the relevant BOM first</li>
    </ul>`},
  pos:{title:'🧾 Purchase Orders',body:`
    <p>Full lifecycle for ordering parts from vendors: Draft → Pending Approval → Approved → Received.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Creating a PO</h4>
    <ol>
      <li>Click <strong>+ New PO</strong></li>
      <li>Select vendor (must be approved — new vendors need their own approval first)</li>
      <li>Add line items: part + quantity + unit price</li>
      <li>Click <strong>Submit</strong></li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Approval workflow</h4>
    <p>If the PO total exceeds a configured dollar threshold, it routes to the assigned approver(s) in sequence.</p>
    <ul>
      <li>The approver gets an app notification (and SMS if enabled)</li>
      <li>They click Approve or Reject from the POs page or their notification</li>
      <li>Multi-step: each approver in the chain must approve before the PO moves forward</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Receiving a PO</h4>
    <ol>
      <li>Open the approved PO</li>
      <li>Click <strong>Receive</strong></li>
      <li>On-hand inventory for each line item increments automatically</li>
      <li>A vendor bill posts to QuickBooks</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">New vendor approval</h4>
    <p>First-time vendors require a separate approval before any PO can be placed. The vendor approval request works the same way as a PO approval — configure the approver in the approval rules settings.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Common issues</h4>
    <ul>
      <li><em>PO stuck at "Pending Approval"</em> → the specific assigned approver must act; check who is assigned in approval rules</li>
      <li><em>Can't select vendor</em> → the vendor may need approval first</li>
    </ul>`},
  boms:{title:'🧩 BOMs & Cost',body:`
    <p>Bill of Materials for each trailer model — the parts and labor that make up every unit's cost.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Reading the BOM</h4>
    <ul>
      <li><strong>Parts table</strong> — each part, quantity per unit, unit cost (live from Parts Master), and extended cost (qty × unit cost)</li>
      <li><strong>Labor routing</strong> — each workstation, hours per unit, $/hr rate, and extended cost</li>
      <li><strong>KPI cards at top</strong> — Material cost, Labor cost, Total cost per unit, Gross margin %</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Proposing a BOM change (requires accounting approval)</h4>
    <ol>
      <li>Select the model from the dropdown at the top</li>
      <li>Change a quantity in the parts table, or click <strong>+ Propose Part</strong> / <strong>+ Propose Step</strong></li>
      <li>A <strong>Pending Change</strong> record is created — the live BOM is <em>not</em> changed yet</li>
      <li>An accounting user goes to the <strong>Accounting</strong> section and clicks <strong>✓ Approve</strong></li>
      <li>After approval, the BOM and cost rollup update immediately</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Cost sources</h4>
    <ul>
      <li>Part costs come from the Parts Master unit cost — update them there</li>
      <li>Labor rates are set per workstation on each labor step</li>
      <li>If the employee roster has payroll data, rates are also informed by average burdened wages per workstation</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Tips</h4>
    <ul>
      <li>You can approve your own proposed changes from the BOM page if you have accounting access</li>
      <li>Multiple pending changes can stack — they apply in order when approved</li>
      <li>Rejected changes are logged but not applied</li>
    </ul>`},
  inventory:{title:'📈 Inventory Value',body:`
    <p>A read-only financial snapshot of all parts currently on hand.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">What's shown</h4>
    <ul>
      <li><strong>Total inventory value</strong> — sum of (on_hand × unit_cost) for every part</li>
      <li><strong>Parts below reorder</strong> — how many SKUs need attention</li>
      <li><strong>Purchased vs Manufactured</strong> split</li>
      <li><strong>Top 15 parts by value</strong> — where your money is concentrated</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">How to use it</h4>
    <ul>
      <li>Review monthly to understand working capital tied up in inventory</li>
      <li>Use the top-15 list to prioritize which parts to audit or reorder carefully</li>
      <li>If a value looks wrong: check the part's unit cost in Parts Master and on_hand quantity</li>
    </ul>
    <p>On-hand quantities increase when POs are received and decrease when orders are built. Costs update when Parts Master unit costs change or vendor invoices are scanned.</p>`},
  accounting:{title:'💵 Accounting',body:`
    <p>QuickBooks Online integration and financial operations hub.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">What happens automatically</h4>
    <ul>
      <li>Order advances to <strong>Ready/Shipped</strong> → invoice posts to QB (customer billed)</li>
      <li>PO is <strong>Received</strong> → vendor bill posts to QB (accounts payable)</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">BOM Change Requests</h4>
    <p>If there are pending BOM edits waiting for approval, they appear in the highlighted card at the top of this page. Click <strong>✓ Approve</strong> to apply a change to the live BOM, or <strong>✕ Reject</strong> to discard it.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Scanning a vendor invoice</h4>
    <ol>
      <li>Select the vendor from the dropdown</li>
      <li>Click <strong>📄 Scan invoice</strong></li>
      <li>The OCR reads line items, updates part unit costs in Parts Master, and posts a vendor bill</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Pulling from QuickBooks</h4>
    <p>Use the pull buttons to import existing QB data into Built Trailers:</p>
    <ul>
      <li><strong>⬇ Customers</strong> — imports QB customers into Customers &amp; Dealers</li>
      <li><strong>⬇ Parts (Items)</strong> — imports QB items into Parts Master</li>
      <li><strong>⬇ Orders (Invoices)</strong> — imports QB invoices as shipped orders</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Connecting QuickBooks</h4>
    <ol>
      <li>Click <strong>Connect QuickBooks</strong> (first time) or <strong>Re-authorize</strong> (token expired)</li>
      <li>Sign in to Intuit and grant access</li>
      <li>QB credentials expire every 100 days — re-authorize when you see a 403 error</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Common issues</h4>
    <ul>
      <li><em>403 / auth error</em> → click Re-authorize and complete sign-in again</li>
      <li><em>Simulated mode badge</em> → set ACCOUNTING_MODE=quickbooks in server environment</li>
      <li><em>Pending events stuck</em> → click "Push pending" to retry; check QB Error Log for details</li>
    </ul>`},
  trailers:{title:'🚛 Trailers & Warranty',body:`
    <p>The per-trailer registry plus build history and warranty. Three tabs: <strong>VINs</strong>, <strong>By Dealer</strong> (completed inventory), and <strong>Warranty Claims</strong>. Click any trailer row to open its full record.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Assigning VINs</h4>
    <ol>
      <li>The <strong>Awaiting VINs</strong> card lists orders whose trailers don't all have VINs yet (shows assigned / quantity).</li>
      <li>Click <strong>Assign VINs</strong> on an order — one compliant VIN is generated per trailer and the units move into the registry.</li>
      <li>VIN assignment requires <strong>Accounting</strong> access. Everyone with Trailers access can view the registry.</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">VIN format</h4>
    <p>Each VIN is a standard 17 characters: your WMI (manufacturer code) + a model descriptor + a calculated check digit + the model-year code + plant code + a sequential serial. The check digit is computed automatically so every VIN validates.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">VIN Settings</h4>
    <p>Click <strong>⚙ VIN Settings</strong> (Accounting only) to set your <strong>WMI</strong> — the 3-character manufacturer code NHTSA assigns you — and your plant code. Set the real WMI before issuing live VINs; it defaults to a placeholder.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Build history (per trailer)</h4>
    <p>Open a trailer and log each major step — <strong>parts built, metal bent, painted, finished, QC passed</strong> — recording who did it. The date &amp; time stamp automatically. This is your accountability trail: if a claim comes in, you can see exactly who built that trailer.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Warranty registration</h4>
    <p>On a trailer, click <strong>Register warranty</strong> to record the owner and term (months). Status shows <strong>In warranty</strong> or <strong>Expired</strong> automatically based on the term.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Warranty claims</h4>
    <ol>
      <li>Open the trailer → <strong>+ New claim</strong>. Describe the issue, add parts used (cost pulled from the parts master), and enter labor &amp; shipping.</li>
      <li>The claim totals <strong>parts + labor + shipping</strong>. Resolve it when the repair is done.</li>
      <li>The <strong>Warranty Claims</strong> tab rolls up total cost and flags your costliest models and dealers. Open claims also appear in everyone's dashboard action inbox.</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Notes</h4>
    <ul>
      <li>VINs are permanent once issued — there's no un-assign, by design.</li>
      <li>Build logging, registration, and claims need editor access; viewing is open to anyone with Trailers access.</li>
    </ul>`},
  team:{title:'👷 Team & Payroll',body:`
    <p>Employee roster and payroll summary.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Employee records</h4>
    <p>Each employee has: name, workstation assignment, base pay rate ($/hr), hire date, and manager. The <strong>workstation</strong> field links to labor routing in BOMs — average wages per workstation inform the burdened labor rate used in cost calculations.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Adding an employee</h4>
    <ol>
      <li>Click <strong>+ Add Employee</strong></li>
      <li>Fill in name, workstation, base rate, hire date, and who they report to</li>
      <li>Save — they now appear in workstation reporting and payroll summary</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Payroll summary</h4>
    <p>Shows estimated total payroll based on headcount × base rates. This is not connected to a payroll processor — it's an internal estimate for planning purposes.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Tips</h4>
    <ul>
      <li>Keep workstation names consistent with the labor step names in BOMs so cost calculations are accurate</li>
      <li>Deactivating a user account (Users &amp; Roles) does not remove them from Team — manage separately</li>
    </ul>`},
  timeoff:{title:'📅 Schedule & Time Off',body:`
    <p>Manages time-off requests and the team schedule.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Submitting a request (employee)</h4>
    <ol>
      <li>Click <strong>+ Request Time Off</strong></li>
      <li>Select date range and leave type (Vacation, Sick, Personal)</li>
      <li>Add a note if needed → Submit</li>
      <li>Your manager and admin will see it in their review queue</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Approving requests (manager / admin)</h4>
    <ol>
      <li>Pending requests appear at the top of the page</li>
      <li>Click <strong>Approve</strong> or <strong>Deny</strong></li>
      <li>Approved time off appears on the team calendar</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Calendar view</h4>
    <p>The calendar shows all approved time off by employee. Use it for scheduling and capacity planning to avoid conflicts during high-production periods.</p>`},
  outcomes:{title:'🎯 Goals & Outcomes',body:`
    <p>Outcome-based goal setting for the team — defines what "success" looks like for each person at every time horizon.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">How it works</h4>
    <ul>
      <li><strong>Admins and managers</strong> set Daily, Weekly, and Monthly outcome statements for each direct report</li>
      <li><strong>Employees</strong> see their own outcomes and can track personal goals</li>
      <li>These are qualitative outcome statements, not a task tracker</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Setting outcomes for your team</h4>
    <ol>
      <li>Scroll to "Set outcomes — team" card</li>
      <li>For each team member, fill in what a successful Day / Week / Month looks like</li>
      <li>Click <strong>Save</strong> on each person's card</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Personal goals</h4>
    <p>Use the "Add goal" form to set personal growth goals for yourself. Choose a time horizon (Day / Week / Month / Quarter / Year). Goals appear on your own outcomes card.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Tips</h4>
    <ul>
      <li>Keep outcome statements brief and measurable ("Ship 4 trailers" not "Work hard")</li>
      <li>Review weekly with direct reports in 1-on-1s</li>
    </ul>`},
  wins:{title:'🎉 Wins',body:`
    <p>Team recognition board. Celebrate accomplishments and build culture.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Posting a win</h4>
    <ol>
      <li>Click <strong>+ Post a Win</strong></li>
      <li>Write a short description of the achievement (a milestone, record, great work, shoutout)</li>
      <li>Tag it to an individual, a workstation, or the whole team</li>
      <li>Post — it appears on the board and on the Dashboard</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Reacting</h4>
    <p>Click any emoji reaction button under a win to add your reaction. Multiple team members can react. Reactions are visible to everyone.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Tips</h4>
    <ul>
      <li>Post wins frequently — even small ones matter for morale</li>
      <li>Tag a workstation to recognize the whole crew, not just individuals</li>
      <li>Recent wins scroll on the Dashboard so the whole team sees them immediately</li>
    </ul>`},
  forecast:{title:'🔮 Forecasting & Planning',body:`
    <p>Financial and capacity planning tools for leadership.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Revenue forecast</h4>
    <p>Projects revenue based on confirmed and in-production orders, with trend analysis from historical shipments. Use this to set monthly targets and identify slow periods early.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Working capital</h4>
    <p>Shows cash tied up in: inventory on hand + accounts receivable (invoiced not yet paid) − accounts payable (bills owed). A negative or very high number indicates cash flow risk.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Production capacity</h4>
    <p>Compares your daily build capacity (set per trailer model) against the current order backlog. If demand exceeds capacity, you'll see a projected backlog date.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Scenario modeling</h4>
    <p>Adjust volume, price, or cost assumptions to see the impact on margin and cash. Use scenarios to answer "what if we took 10 more orders this month?" before committing.</p>`},
  notify:{title:'💬 Notifications',body:`
    <p><strong>Text alerts are paused — coming soon.</strong> While carrier (A2P) registration is completed, no SMS is sent. Notifications are delivered two ways instead:</p>
    <ul>
      <li><strong>In-app feed</strong> — staff see the Action Inbox on the dashboard; dealers see the 🔔 feed in their portal.</li>
      <li><strong>Phone push</strong> — staff and dealers can tap <strong>Enable notifications</strong> to get native phone/desktop alerts (order status, approvals, warranty updates), even when the app is closed.</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Employee approval notifications</h4>
    <p>When a PO or BOM change needs an employee's approval, they get an in-app notification — and a phone push if they've enabled it.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Turning SMS back on later</h4>
    <p>Once the A2P campaign is approved, set <code>SMS_ENABLED=true</code> (with <code>SMS_MODE=twilio</code> and Twilio credentials) to restore text alerts. The opt-in page and consent flow come back automatically.</p>`},
  support:{title:'🆘 Support',body:`
    <p>In-app help desk. You're using it right now.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Ticket types</h4>
    <ul>
      <li><strong>Question</strong> — the AI answers in real time; no human needed for most questions</li>
      <li><strong>Bug Report</strong> — something is broken; gets escalated to a developer</li>
      <li><strong>Feature Request</strong> — capability the system doesn't have yet; logged for review</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Starting a ticket</h4>
    <ol>
      <li>Click <strong>New support ticket</strong></li>
      <li>Choose the type and write a clear description of what's happening (or what you need)</li>
      <li>Submit — the AI responds immediately</li>
      <li>Keep chatting to narrow down the problem</li>
      <li>If unresolved, click <strong>Escalate</strong> to flag it for developer review</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Admin review queue</h4>
    <p>Admins see all tickets (not just their own) in the review pane. They can add internal notes, change ticket status, and mark issues resolved.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Tips for better AI answers</h4>
    <ul>
      <li>Say which section you're in ("I'm on the POs page...")</li>
      <li>Describe what you expected vs what actually happened</li>
      <li>Include any error message text you see</li>
    </ul>`},
  users:{title:'👤 Users & Roles',body:`
    <p>Manages who has access to the system and what they can do.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Adding a user</h4>
    <ol>
      <li>Click <strong>+ Add User</strong></li>
      <li>Enter full name, username (they'll log in with this), job title, and a temporary password</li>
      <li>Click Create — they can log in immediately and change their password from the top-right menu</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Assigning multiple job titles</h4>
    <ol>
      <li>Find the user in the Users table</li>
      <li>Click the <strong>＋</strong> button on their row</li>
      <li>Check/uncheck the titles they should hold</li>
      <li>Their effective access = union of all assigned titles' sections; their effective tier = highest tier among all titles</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">Job Titles & Permissions</h4>
    <ul>
      <li>Each title has a <strong>tier</strong> (Admin / Editor / Viewer) and a list of <strong>sections</strong> it can access</li>
      <li>Click <strong>Edit access</strong> to open a checkbox grid of all 18 app sections</li>
      <li>Tier controls what actions are possible; sections control which nav items are visible</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Permission tiers</h4>
    <ul>
      <li><strong>Admin</strong> — full access: user management, BOM approvals, all sections</li>
      <li><strong>Editor</strong> — create and edit orders, POs, customers, parts, employees</li>
      <li><strong>Viewer</strong> — read-only on their assigned sections</li>
    </ul>
    <h4 style="color:var(--accent);margin:14px 0 6px">Deactivating vs deleting</h4>
    <ul>
      <li><strong>Deactivate</strong> — user can no longer log in; all their records are preserved (used when someone has order/PO history)</li>
      <li><strong>Delete</strong> — permanently removes the account (only available if the user has no transaction history)</li>
    </ul>`}
};
function showHelp(section){
  const h=HELP[section];
  if(!h)return modal('Help','<p class="muted">No guide available for this section yet.</p>');
  const style=`<style>.help-body h4{font-size:13px;margin:14px 0 5px}.help-body ul,.help-body ol{padding-left:18px;color:var(--muted);font-size:13px;line-height:1.7}.help-body li{margin-bottom:4px}.help-body p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:10px}.help-body strong{color:var(--text)}.help-body code{background:var(--bg);padding:1px 4px;border-radius:4px;font-size:12px}</style>`;
  modal(h.title,style+`<div class="help-body" style="max-height:65vh;overflow-y:auto;padding-right:4px">${h.body}</div>`);
}

// ── Action Inbox ─────────────────────────────────────────────────────────────
function greeting(){const h=new Date().getHours();return h<12?'Good morning':h<18?'Good afternoon':'Good evening';}
function renderInbox(items){
  const first=(ME.name||'').split(' ')[0];
  const head=`<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <h3 style="margin:0;font-size:16px;color:var(--txt);text-transform:none;letter-spacing:0">👋 ${greeting()}, ${esc(first)}</h3>
      ${items.length?`<span class="badge b-low">${items.length} thing${items.length===1?'':'s'} need you</span>`:`<span class="badge b-ok">All caught up</span>`}</div>`;
  if(!items.length){
    return `<div class="card" style="border-color:var(--green);margin-bottom:16px">${head}
      <p class="muted" style="margin:10px 0 0">✅ Nothing needs your attention right now. Nicely done.</p></div>`;
  }
  const rows=items.map((i,idx)=>`<div style="display:flex;align-items:center;gap:12px;padding:11px 0;${idx<items.length-1?'border-bottom:1px solid var(--panel2)':''}">
      <span style="font-size:20px;line-height:1">${i.icon}</span>
      <span style="flex:1">${esc(i.label)}</span>
      <button class="btn sm" onclick="go('${i.link}')">Open →</button>
    </div>`).join('');
  return `<div class="card" style="border-color:var(--accent);margin-bottom:16px">${head}
    <div style="margin-top:6px">${rows}</div></div>`;
}

async function viewDash(){
  $('pTitle').textContent='Dashboard';$('pSub').textContent='Phase 1 — single source of truth (live from the database)';$('pActions').innerHTML='';
  const [inv,models,inbox]=await Promise.all([api('/api/inventory/summary'),api('/api/models'),api('/api/inbox').catch(()=>({items:[]}))]);
  const avgMargin=models.reduce((s,m)=>s+m.margin,0)/models.length*100;
  $('content').innerHTML=`
   ${renderInbox(inbox.items||[])}
   <div class="banner">✅ Connected to the live API and database. Every figure below is computed server-side from stored data.</div>
   <div class="grid g4">
    ${kpi('Inventory value',money(inv.totalValue),inv.skuCount+' SKUs on hand')}
    ${kpi('Trailer models',models.length,inv.manufactured+' make / '+inv.purchased+' buy parts')}
    ${kpi('Avg gross margin',avgMargin.toFixed(1)+'%','across all models')}
    ${kpi('Below reorder',inv.belowReorder,'parts need attention')}
   </div>
   <div class="card" style="margin-top:16px"><h3>Model cost & margin</h3>

async function syncQBItems(mode){
  let ids=null;
  if(mode==='selected'){
    ids=[...document.querySelectorAll('.qb-cb:checked')].map(c=>c.dataset.id);
    if(!ids.length){toast('No items selected');return;}
  }
  const out=$('qbSyncOut');if(out)out.innerHTML='<span class="muted">Syncing…</span>';
  try{
    const r=await api('/api/qbo/pull',{method:'POST',body:JSON.stringify({what:['items'],itemIds:ids})});
    const v=r.results.items;
    if(out)out.innerHTML=`<span class="badge b-ok">${v.created} created &nbsp; ${v.updated} updated &nbsp; ${v.skipped} skipped</span>`;
    toast(`QB items synced — ${v.created} new, ${v.updated} updated`);
    viewParts();
  }catch(e){if(out)out.innerHTML=qboErrBanner(e);toast(e.message);}

function bomCrDesc(cr){
  const p=cr.payload||{};
  switch(cr.op){
    case 'update_qty':  return `Change <b>${esc(p.partName||p.partId)}</b> qty: ${p.oldQty} → <b>${p.newQty}</b>`;
    case 'add_part':    return `Add part <b>${esc(p.partName||p.partId)}</b> × ${p.qty}`;
    case 'remove_part': return `Remove <b>${esc(p.partName||p.partId)}</b> from BOM`;
    case 'update_labor':return `Change <b>${esc(p.ws)}</b>: ${p.oldHours}h@$${p.oldRate} → ${p.newHours}h@$${p.newRate}`;
    case 'add_labor':   return `Add labor step <b>${esc(p.ws)}</b>: ${p.hours}h @ $${p.rate}/hr`;
    case 'remove_labor':return `Remove labor step <b>${esc(p.ws)}</b>`;
    default: return esc(cr.op);
  }
}

// Multi-select role picker: a dropdown of checkboxes so a user can hold several job titles.
function roleCheckboxHtml(p,roles,pre){
  const sel=new Set(pre||[]);
  const label=sel.size?[...sel].join(', '):'— select roles —';
  return `<div class="rolesel" id="${p}Box">
    <div class="rolesel-head" onclick="toggleRoleSel('${p}')"><span id="${p}Label" class="${sel.size?'':'ph'}">${esc(label)}</span><span style="margin-left:auto;opacity:.55">▾</span></div>
    <div class="rolesel-list" id="${p}List" style="display:none">
      ${roles.map(r=>`<label class="rolesel-item"><input type="checkbox" class="${p}Chk" value="${esc(r.name)}" ${sel.has(r.name)?'checked':''} onchange="syncRoleSel('${p}')"><b>${esc(r.name)}</b> <span class="pill ${r.tier}" style="font-size:10px">${r.tier}</span></label>`).join('')}
    </div></div>`;
}
function toggleRoleSel(p){const l=$(p+'List');if(l)l.style.display=l.style.display==='none'?'block':'none';}
function syncRoleSel(p){const names=[...document.querySelectorAll('.'+p+'Chk:checked')].map(c=>c.value);const lab=$(p+'Label');if(lab){lab.textContent=names.length?names.join(', '):'— select roles —';lab.className=names.length?'':'ph';}}
function getRoleSel(p){return [...document.querySelectorAll('.'+p+'Chk:checked')].map(c=>c.value);}

async function checkEuAutoConsent(){

  }catch{$('euAutoTag').style.display='none';}

async function saveUserSms(id){
  const phone=($('euPhone').value||'').trim();
  const smsConsent=$('euConsent').checked;

  try{await api('/api/users/'+id,{method:'PATCH',body:JSON.stringify({phone:phone||null,smsConsent})});closeModal();toast('Saved');viewUsers();}catch(e){toast(e.message);}
}
async function revokeUserSms(id){

function changePassword(id,name){

async function deleteUser(id,name){

}
async function reactivateUser(id,name){

  try{await api('/api/users/'+id+'/reactivate',{method:'PATCH'});toast(name+' reactivated');viewUsers();}catch(e){toast(e.message);}

async function savePassword(id){
  const pw=($('cpPw').value||'').trim();
  const pw2=($('cpPw2').value||'').trim();
  if(pw.length<8)return toast('Password must be at least 8 characters');

  const url=isSelf?'/api/users/me/password':'/api/users/'+id;

// ============ PHASE 2: ORDERS / FULFILLMENT / DEALERS ============
function modal(title,html){const d=document.createElement('div');d.className='modal-bg';d.id='modalBg';d.onclick=e=>{if(e.target===d)d.remove();};d.innerHTML=`<div class="modal"><h2 style="margin-bottom:14px">${title}</h2>${html}</div>`;document.body.appendChild(d);}
function closeModal(){const m=$('modalBg');if(m)m.remove();}

let ordFilter='All', ordView='board';
const canReorder=()=>ME&&(ME.role==='admin'||hasTitle('Sales','Rep Specialist','General Manager','Shop Manager','Office Manager'));
function stageBadge(s){const m={'Quote':'b-low','Confirmed':'b-buy','Scheduled':'b-buy','Build':'b-mfg','Paint/Powder Coat':'b-low','Finish':'b-buy','Ready':'b-ok'};return `<span class="badge ${m[s]||'b-buy'}">${esc(s)}</span>`;}
async function viewOrders(){
  $('pTitle').textContent='Build';
  $('pSub').textContent=ordView==='queue'?('Production priority — '+(canReorder()?'use ↑ ↓ to resequence':'read-only')):('Build pipeline — '+(canEdit()?'drag a card to change its stage':'read-only'));
  $('pActions').innerHTML=canSell()?`<button class="btn" onclick="go('neworder')">➕ New Order</button>`:'';
  const {stages,orders}=await api('/api/orders');
  const live=orders.filter(o=>!o.billed); // invoiced orders drop off the board
  const viewToggle=`<div class="tabs" style="margin-bottom:12px"><button class="${ordView==='board'?'active':''}" onclick="ordView='board';viewOrders()">🗂️ Board</button><button class="${ordView==='queue'?'active':''}" onclick="ordView='queue';viewOrders()">🏭 Production Queue</button></div>`;
  if(ordView==='queue'){ $('content').innerHTML=viewToggle+renderQueue(orders); return; }
  const types=['All',...Array.from(new Set(live.map(o=>o.type)))];
  const filtered=ordFilter==='All'?live:live.filter(o=>o.type===ordFilter);
  const tabs=`<div class="tabs">${types.map(t=>`<button class="${ordFilter===t?'active':''}" onclick="ordFilter='${t}';viewOrders()">${t}<span style="opacity:.7;margin-left:5px">${t==='All'?live.length:live.filter(o=>o.type===t).length}</span></button>`).join('')}</div>`;
  const board=`<div class="kanban">${stages.map(st=>`
    <div class="col" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="dropOrder(event,'${st}')">
      <h4>${esc(st)}<span>${filtered.filter(o=>o.stage===st).length}</span></h4>
      ${filtered.filter(o=>o.stage===st).map(o=>`<div class="ocard" draggable="${canEdit()}" ondragstart="window._drag='${o.id}'" onclick="orderDetail('${o.id}')">
        <div class="t"><span>${o.id}</span><span>${money(o.revenue)}</span></div>
        <div>${o.qty}× ${o.model}</div>
        <div class="muted" style="font-size:11px">${o.customer} · <span class="badge b-buy">${o.type}</span></div></div>`).join('')}
    </div>`).join('')}</div>`;
  // per-type summary
  const summary=`<div class="card" style="margin-top:16px"><h3>Fulfillment by trailer type</h3>
   <table><thead><tr><th>Type</th><th class="right">Open orders</th><th class="right">Units</th><th class="right">Backlog value</th></tr></thead><tbody>
   ${Array.from(new Set(live.map(o=>o.type))).map(t=>{const os=live.filter(o=>o.type===t);return `<tr><td><b>${t}</b></td><td class="right">${os.length}</td><td class="right">${os.reduce((a,o)=>a+o.qty,0)}</td><td class="right">${money(os.reduce((a,o)=>a+o.revenue,0))}</td></tr>`;}).join('')}
   </tbody></table></div>`;
  $('content').innerHTML=viewToggle+tabs+board+summary;
}
function renderQueue(orders){
  const q=orders.filter(o=>o.stage!=='Ready' && !o.billed).sort((a,b)=>(a.prodSeq??1e9)-(b.prodSeq??1e9));
  window._queue=q.map(o=>o.id);
  const editable=canReorder();
  if(!q.length) return `<div class="card"><p class="muted">No active orders in the production queue. Orders appear here until they reach Ready.</p></div>`;
  const rows=q.map((o,i)=>`<tr>
      <td class="center" style="font-weight:700;color:var(--accent);font-size:15px">${i+1}</td>
      <td><b>${esc(o.id)}</b><br><span class="muted" style="font-size:11px">${esc(o.customer||'')}</span></td>
      <td>${o.qty}× ${esc(o.model||'')} <span class="badge b-buy" style="margin-left:4px">${esc(o.type||'')}</span></td>
      <td>${stageBadge(o.stage)}</td>
      <td class="right muted" style="font-size:12px">${esc(o.due?String(o.due).slice(0,10):'—')}</td>
      ${editable?`<td class="center" style="white-space:nowrap">
        <button class="btn sm sec" ${i===0?'disabled':''} onclick="moveQueue(${i},-1)" title="Move up">↑</button>
        <button class="btn sm sec" ${i===q.length-1?'disabled':''} onclick="moveQueue(${i},1)" title="Move down">↓</button></td>`:''}
    </tr>`).join('');
  return `<div class="card"><h3>Production Queue <span class="muted" style="text-transform:none;letter-spacing:0">— built top to bottom · ${q.length} active</span></h3>
    <table><thead><tr><th class="center">#</th><th>Order</th><th>Trailer</th><th>Stage</th><th class="right">Due</th>${editable?'<th class="center">Move</th>':''}</tr></thead>
    <tbody>${rows}</tbody></table>
    ${editable?'':`<p class="muted" style="font-size:12px;margin-top:10px">🔒 Reordering is limited to Sales, the GM, the Shop Manager, and the Office Manager.</p>`}</div>`;
}
async function moveQueue(i,dir){
  const arr=window._queue; if(!arr) return;
  const j=i+dir; if(j<0||j>=arr.length) return;
  [arr[i],arr[j]]=[arr[j],arr[i]];
  try{ await api('/api/orders/production-order',{method:'POST',body:JSON.stringify({order:arr})}); toast('Production queue updated'); viewOrders(); }
  catch(e){ toast(e.message); }
}
async function dropOrder(e,stage){
  e.preventDefault();e.currentTarget.classList.remove('over');
  if(!canEdit()||!window._drag)return;
  const id=window._drag;window._drag=null;
  try{ await api('/api/orders/'+id+'/stage',{method:'PATCH',body:JSON.stringify({stage})});
    toast(stage==='Ready'?id+' → Ready (waiting to invoice)':id+' → '+stage); viewOrders();
  }catch(err){toast(err.message);}
}
async function orderDetail(id){

    <div style="margin-bottom:10px"><span class="badge b-buy">${o.type}</span> <span class="muted">${o.qty}× ${o.model} · ${o.stage} · due ${o.due||'—'}</span></div>
    <div class="grid g4" style="grid-template-columns:1fr 1fr;margin-bottom:12px">
      ${kpi('Revenue',money(o.revenue),'')}${kpi('Rep',o.rep||'—','')}</div>

    </tbody></table>
    ${canSell()&&o.stage==='Ready'?`<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--line)"><button class="btn" onclick="invoiceOrder('${o.id}')">🧾 Invoice &amp; close</button> <span class="muted" style="font-size:12px">Posts the invoice, relieves inventory, and removes it from the board.</span></div>`:''}`);
}
async function invoiceOrder(id){
  if(!confirm('Invoice this order?\n\nThis consumes its parts from inventory, posts the customer invoice, and removes it from the Build board.'))return;
  try{ await api('/api/orders/'+id+'/invoice',{method:'POST'}); closeModal(); toast(id+' invoiced — off the board'); viewOrders(); }

// ============ PHASE 3: PREDICTIVE ORDERING / PURCHASE ORDERS ============
async function viewPredict(){

async function decideApproval(token, decision){
  const note=decision==='rejected'?prompt('Reason for rejection (optional):',''):null;
  if(decision==='rejected'&&note===null)return;
  try{
    const r=await api('/api/approvals/'+token+'/decide',{method:'POST',body:JSON.stringify({decision,note:note||null})});
    toast(decision==='approved'?`Approved — ${r.outcome==='fully_approved'?'PO is now open':'next approver notified'}`:`Rejected — PO cancelled`);
    viewPOs();
  }catch(e){toast(e.message);}
}
function showAddRule(){$('addRuleForm').style.display=$('addRuleForm').style.display==='none'?'block':'none';}
async function saveRule(){
  try{
    await api('/api/approval-rules',{method:'POST',body:JSON.stringify({
      type:$('ruleType').value, minAmount:$('ruleMin').value?Number($('ruleMin').value):null,
      maxAmount:$('ruleMax').value?Number($('ruleMax').value):null,
      approverId:$('ruleApprover').value, seq:Number($('ruleSeq').value||1),
      notify:$('ruleNotify').value, label:$('ruleLabel').value||null

let _tcRows=[], _tcItems=[], _tcIncludeLabor=true;
async function pushTrailerCosts(){
  let data; try{ data=await api('/api/accounting/trailer-costs?includeLabor='+(_tcIncludeLabor?'1':'0')); }catch(e){ return toast(e.message); }
  _tcRows=data.rows||[]; _tcItems=data.items||[];
  if(!data.connected){
    return modal('Push trailer costs to QuickBooks',`<p class="muted">QuickBooks isn't connected${data.error?': '+esc(data.error):''}. Connect it first (⬇ Pull from QuickBooks), then push.</p>
      <div class="card" style="margin-top:10px"><h4 style="margin:0 0 8px">App costs (from BOMs)</h4>
      <table><thead><tr><th>Trailer</th><th class="right">Material</th><th class="right">Labor</th><th class="right">Total</th></tr></thead><tbody>
      ${_tcRows.map(r=>`<tr><td>${esc(r.model)}</td><td class="right">${money(r.material)}</td><td class="right">${money(r.laborCost)}</td><td class="right"><b>${money(r.totalCost)}</b></td></tr>`).join('')}

      <div class="row" style="margin-top:10px"><button class="btn sec" onclick="closeModal()">Close</button></div>`);

}
function syncTcSel(){ _tcRows.forEach((r,idx)=>{ const s=$('tcSel'+idx); if(s) r.qbItemId=s.value||null; }); }
function renderTrailerCostModal(){
  const opts=(sel)=>`<option value="">— no QB item —</option>`+_tcItems.map(i=>`<option value="${esc(i.id)}" ${i.id===sel?'selected':''}>${esc(i.name)} (cost ${money(i.cost)})</option>`).join('');
  const body=`
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:14px;cursor:pointer"><input type="checkbox" id="tcLabor" ${_tcIncludeLabor?'checked':''} onchange="syncTcSel();_tcIncludeLabor=this.checked;renderTrailerCostModal()"> Include labor in cost <span class="muted">(unchecked = material only)</span></label>
    <table><thead><tr><th>Trailer</th><th class="right">App cost</th><th>QuickBooks item</th><th class="right">QB cost now</th><th class="center"></th></tr></thead><tbody>
    ${_tcRows.map((r,idx)=>{const appCost=_tcIncludeLabor?r.totalCost:r.material; const willChange=r.qbItemId&&r.currentQbCost!=null&&Math.abs(r.currentQbCost-appCost)>0.005; const badge=!r.qbItemId?'<span class="badge b-buy">map →</span>':(r.currentQbCost==null?'<span class="badge b-low">set</span>':(willChange?'<span class="badge b-low">update</span>':'<span class="badge b-ok">match</span>'));
      return `<tr>
      <td><b>${esc(r.model)}</b></td>
      <td class="right">${money(appCost)}</td>
      <td><select id="tcSel${idx}" style="font-size:12px;max-width:260px">${opts(r.qbItemId)}</select></td>

    </tr>`;}).join('')}
    </tbody></table>
    <p class="muted" style="font-size:11px;margin-top:8px">Writes each trailer's app cost to its QuickBooks item <b>Cost</b> (PurchaseCost). Sales price is never changed. The chosen mapping is saved for next time.</p>
    <div class="row" style="gap:8px;margin-top:10px"><button class="btn" onclick="doPushTrailerCosts()">⬆ Push to QuickBooks</button><button class="btn sec" onclick="closeModal()">Cancel</button></div>`;

async function doPushTrailerCosts(){
  syncTcSel();
  const items=_tcRows.filter(r=>r.qbItemId).map(r=>({modelId:r.modelId,qbItemId:r.qbItemId}));
  if(!items.length) return toast('Pick a QuickBooks item for at least one trailer');
  if(!confirm(`Push ${items.length} trailer cost${items.length>1?'s':''} to QuickBooks? This updates each item's Cost in your live QuickBooks.`)) return;
  try{
    const r=await api('/api/accounting/trailer-costs/push',{method:'POST',body:JSON.stringify({includeLabor:_tcIncludeLabor,items})});
    closeModal();
    const fails=r.results.filter(x=>!x.ok);
    toast(`Pushed ${r.pushed}/${r.total} trailer cost${r.total>1?'s':''} to QuickBooks`+(fails.length?` — ${fails.length} failed`:''));
    modal('Push results',`<table><thead><tr><th>Trailer</th><th>Result</th></tr></thead><tbody>${r.results.map(x=>`<tr><td>${esc(x.model||x.modelId)}</td><td>${x.ok?`<span class="badge b-ok">✓ Cost set to ${money(x.cost)}</span>`:`<span class="badge b-low">✗ ${esc(x.error||'failed')}</span>`}</td></tr>`).join('')}</tbody></table><div class="row" style="margin-top:10px"><button class="btn sec" onclick="closeModal()">Close</button></div>`);
  }catch(e){ toast(e.message); }
}

async function qboTest(){
  toast('Testing QuickBooks…');
  try{
    const r=await api('/api/qbo/test');
    const steps=r.steps||[];
    const label={refresh_token_available:'Refresh token available',token_refresh:'Exchange token with Intuit',company_info:'Read company info'};
    const rows=steps.map(s=>{
      const ok=s.ok?'<span style="color:#2e7d32;font-weight:700">✓</span>':'<span style="color:#c0392b;font-weight:700">✗</span>';
      let detail='';
      if(s.step==='refresh_token_available') detail=s.ok?('from '+esc(s.source||'')):'no token — click Connect QuickBooks';
      else if(s.step==='token_refresh') detail=s.ok?'tokens received':('HTTP '+(s.status||'?')+' — '+esc(String(s.body||'').slice(0,180)));
      else if(s.step==='company_info') detail=s.ok?('Company: <b>'+esc(String(s.body))+'</b>'):('HTTP '+(s.status||'?')+' — '+esc(String(s.body||'').slice(0,180)));
      return '<tr><td style="padding:5px 8px;vertical-align:top">'+ok+'</td><td style="padding:5px 8px;white-space:nowrap;vertical-align:top">'+(label[s.step]||esc(s.step))+'</td><td style="padding:5px 8px;color:var(--muted);font-size:12px">'+detail+'</td></tr>';
    }).join('');
    const allOk=steps.length>0&&steps.every(s=>s.ok);
    const head=allOk?'<p style="color:#2e7d32;font-weight:600;margin-bottom:10px">✓ Connected'+(r.realmId?' — realm '+esc(r.realmId)+' ('+esc(r.env||'')+')':'')+'</p>':'<p style="color:#c0392b;font-weight:600;margin-bottom:10px">✗ Not fully connected — see steps below</p>';
    const tip=allOk?'':'<p class="muted" style="margin-top:10px;font-size:12px">If the token step failed, click <b>Re-authorize</b> to reconnect.</p>';
    modal('QuickBooks connection test',head+'<table style="width:100%;border-collapse:collapse">'+rows+'</table>'+tip);
  }catch(e){ toast(e.message); }
}

function sparkline(hist,fc){
  const all=[...hist,...fc];const max=Math.max(1,...all);const W=240,H=44,n=all.length;
  const pts=all.map((v,i)=>`${(i/(n-1)*W).toFixed(1)},${(H-v/max*H).toFixed(1)}`).join(' ');
  const split=((hist.length-1)/(n-1)*W).toFixed(1);
  return `<svg width="${W}" height="${H}" style="overflow:visible"><polyline points="${pts}" fill="none" stroke="#5aa9ff" stroke-width="2"/><line x1="${split}" y1="0" x2="${split}" y2="${H}" stroke="var(--line)" stroke-dasharray="3 3"/></svg>`;
}
