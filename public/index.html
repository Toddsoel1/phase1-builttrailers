<html lang="en">
<head>

<style>
:root{--bg:#0f1419;--panel:#161c24;--panel2:#1d2630;--line:#2a3540;--txt:#e7edf3;--muted:#8b9aa8;--accent:#ff7a18;--green:#3ecf8e;--red:#ff5d5d;--yellow:#ffd166;--blue:#5aa9ff;--mfg:#ba7dff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
.hidden{display:none!important}
.app{display:flex;min-height:100vh}
.sidebar{width:215px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:18px;border-bottom:1px solid var(--line)}.brand h1{font-size:16px}.brand .t{color:var(--accent)}.brand small{color:var(--muted);font-size:11px}
.nav{padding:10px 8px 18px;flex:1;overflow-y:auto;min-height:0;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
/* Styled (always-visible) scrollbar so nav overflow is discoverable — macOS overlay scrollbars
   hide until scrolled, which made the bottom Admin group look like it had vanished. */
.nav::-webkit-scrollbar{width:6px}.nav::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}.nav::-webkit-scrollbar-track{background:transparent}.nav button{width:100%;text-align:left;background:none;border:none;color:var(--muted);padding:10px 12px;border-radius:8px;font-size:13.5px;margin-bottom:2px}
.nav button:hover{background:var(--panel2);color:var(--txt)}.nav button.active{background:linear-gradient(90deg,rgba(255,122,24,.18),transparent);color:var(--txt);font-weight:600;box-shadow:inset 3px 0 0 var(--accent)}
.nav button.navhdr{padding:11px 12px 3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#7e8b99;margin-top:5px;display:flex;justify-content:space-between;align-items:center}
.nav button.navhdr:hover{background:none;color:#cbd5e1}.navchev{font-size:8px;opacity:.55}
.who{padding:12px;border-top:1px solid var(--line);font-size:12px}.who b{display:block;margin:3px 0}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;text-transform:uppercase}
.pill.admin{background:rgba(255,122,24,.2);color:#ffb347}.pill.editor{background:rgba(90,169,255,.2);color:var(--blue)}.pill.viewer{background:rgba(139,154,168,.2);color:var(--muted)}
.main{flex:1;min-width:0}.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:10}
.topbar h2{font-size:18px}.topbar .sub{color:var(--muted);font-size:12px}
.content{padding:20px 22px}
.grid{display:grid;gap:14px}.g4{grid-template-columns:repeat(4,1fr)}@media(max-width:1000px){.g4{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.card h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.kpi .v{font-size:26px;font-weight:700}.kpi .s{font-size:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px;border-bottom:1px solid var(--line)}
td{padding:8px;border-bottom:1px solid var(--panel2)}tr:hover td{background:var(--panel2)}.right{text-align:right}.center{text-align:center}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}.b-ok{background:rgba(62,207,142,.15);color:var(--green)}.b-low{background:rgba(255,209,102,.15);color:var(--yellow)}.b-below{background:rgba(255,93,93,.15);color:var(--red)}
.b-buy{background:rgba(90,169,255,.15);color:var(--blue)}.b-mfg{background:rgba(186,125,255,.15);color:var(--mfg)}
.btn{background:var(--accent);color:#1a1206;border:none;padding:8px 14px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}.btn.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}.btn.sm{padding:4px 9px;font-size:12px}
input,select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:8px;font-size:13px;font-family:inherit}
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;padding:20px}
.login .box{max-width:430px;width:100%;display:grid;grid-template-columns:1fr;border:1px solid var(--line);border-radius:16px;overflow:hidden}
@media(max-width:760px){.login .box{grid-template-columns:1fr}}
.login .l{padding:32px;background:var(--panel)}.login .r{padding:22px;background:var(--panel2);max-height:520px;overflow:auto}
.login .field{margin-bottom:12px}.login label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.login input{width:100%}
.err{color:var(--red);font-size:13px;min-height:18px}
a.lnk{color:var(--blue);cursor:pointer}
.banner{background:linear-gradient(100deg,rgba(62,207,142,.12),transparent);border:1px solid rgba(62,207,142,.3);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border-left:4px solid var(--accent);border:1px solid var(--accent);border-radius:9px;padding:11px 15px;z-index:200}
.kanban{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:start}@media(max-width:1200px){.kanban{grid-template-columns:repeat(3,1fr)}}
.col{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px;min-height:80px}
.col h4{font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;justify-content:space-between}
.col.over{border-color:var(--accent);background:var(--panel2)}
.ocard{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px;margin-bottom:7px;cursor:grab;font-size:12px}
.ocard .t{display:flex;justify-content:space-between;font-weight:700;margin-bottom:2px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}.tabs button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer}.tabs button.active{background:var(--accent);color:#1a1206;font-weight:700}
.field{margin-bottom:12px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.field input,.field select,.field textarea{width:100%}
.rolesel{border:1px solid var(--line);border-radius:8px;background:var(--panel2);overflow:hidden}
.rolesel-head{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;font-size:13px;color:var(--txt)}
.rolesel-head .ph{color:var(--muted)}
.rolesel-list{border-top:1px solid var(--line);max-height:220px;overflow-y:auto;background:var(--panel)}
.rolesel-item{display:flex;align-items:center;gap:8px;padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--line);font-size:13px}
.rolesel-item:last-child{border-bottom:none}.rolesel-item:hover{background:var(--panel2)}
.rolesel-item input{width:auto;margin:0}
.row{display:flex;gap:12px}.row>*{flex:1}
.chip{display:inline-block;border:1px solid var(--line);border-radius:20px;padding:4px 10px;font-size:12px;margin:2px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:150;padding:20px}.modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:540px;width:100%;max-height:86vh;overflow:auto}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:860px){.split{grid-template-columns:1fr}}
/* ── Mobile (≤860px): the staff app on a phone — off-canvas nav, swipeable board, no-zoom inputs ── */
.navbtn{display:none;background:none;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 11px;font-size:16px;line-height:1;flex-shrink:0}
.navbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:39}
@media(max-width:860px){
  .navbtn{display:inline-block}
  .sidebar{position:fixed;left:0;top:0;bottom:0;height:100vh;height:100dvh;z-index:40;transform:translateX(-105%);transition:transform .18s ease;box-shadow:4px 0 24px rgba(0,0,0,.45)}
  body.navopen .sidebar{transform:translateX(0)}
  body.navopen .navbg{display:block}
  .topbar{padding:10px 12px;gap:8px;flex-wrap:wrap}
  .topbar h2{font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .sub{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .content{padding:12px 10px}
  .card{padding:13px}
  table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
  .kanban{display:flex;overflow-x:auto;gap:10px;padding-bottom:8px;-webkit-overflow-scrolling:touch}
  .kanban .col{min-width:240px;flex:0 0 240px}
  .modal-bg{padding:8px 8px 16px;align-items:flex-start;padding-top:14px}
  .modal{max-width:100%;padding:14px;max-height:92vh}
  input,select,textarea{font-size:16px} /* ≥16px stops iOS zoom-on-focus */
  .grid.g4{grid-template-columns:repeat(2,1fr);gap:10px}
}
/* 📺 TV mode: chrome-free, hands-free — the rotating big board for a wall display */
body.tv .sidebar,body.tv .navbtn,body.tv .navbg{display:none!important}
body.tv .topbar button,body.tv #pActions{display:none!important}
body.tv .topbar h2{font-size:24px}
#tvExit{position:fixed;right:16px;bottom:16px;z-index:500;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:9px 16px;cursor:pointer;opacity:.25;transition:opacity .15s}
#tvExit:hover{opacity:1}
</style>

<body>
<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <div class="l">
      <h1 style="font-size:22px">BUILT <span style="color:var(--accent)">TRAILERS</span></h1>
      <div style="color:var(--muted);margin-bottom:20px;font-size:13px">Phase 1 — live hosted environment</div>
      <div class="field"><label>Username</label><input id="liUser" autocomplete="username"></div>
      <div class="field"><label>Password</label><input id="liPass" type="password" autocomplete="current-password"></div>
      <div class="err" id="liErr"></div>
      <button class="btn" style="width:100%" onclick="login()">Sign in</button>
      <p style="color:var(--muted);font-size:11px;margin-top:12px">Secure auth: passwords are bcrypt-hashed in the database; sessions use JWT.</p>
      <button class="btn sec installBtn" style="width:100%;margin-top:14px;display:none" onclick="promptInstall()">📲 Install app on your phone</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app hidden" id="app">
  <aside class="sidebar">
    <div class="brand"><h1>BUILT <span class="t">TRAILERS</span></h1><small>Phase 1 · live</small></div>
    <nav class="nav" id="nav"></nav>
    <div class="who"><div class="muted">Signed in as</div><b id="whoName"></b><span id="whoPill"></span>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn sec sm" id="pushBtn" style="flex:1" title="Enable notifications" onclick="enablePush('/api/push/subscribe')">🔔</button>
        <button class="btn sec sm" style="flex:1" title="My profile — email &amp; work week" onclick="myEmailModal()">👤</button>
        <button class="btn sec sm" style="flex:1.6" title="Log out" onclick="logout()">Log out</button>
      </div></div>
  </aside>
  <div class="navbg" onclick="closeMobileNav()"></div>
  <main class="main">
    <div class="topbar"><div style="display:flex;align-items:center;gap:10px;min-width:0"><button class="navbtn" onclick="toggleMobileNav(event)" title="Menu">☰</button><div style="min-width:0"><h2 id="pTitle">Dashboard</h2><div class="sub" id="pSub"></div></div></div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><button class="btn sm sec" onclick="openSearch()" title="Search everything (Cmd+K / Ctrl+K)">🔍 <span class="muted" style="font-size:11px">⌘K</span></button><div id="pActions"></div></div></div>
    <div class="content" id="content"></div>
  </main>
</div>
<div id="toast"></div>

<script>
const API = window.location.origin;
let TOKEN = null, ME = null, page = 'dashboard';
const $ = id => document.getElementById(id);
// Report uncaught front-end errors to the server so a browser crash is visible in the logs too.
(function(){ let n=0; const MAX=10;
  function report(kind,message,stack){ if(n++>=MAX) return;
    try{ const body=JSON.stringify({kind,message:String(message||'').slice(0,500),stack:String(stack||'').slice(0,2000),url:location.href});
      if(navigator.sendBeacon) navigator.sendBeacon('/api/client-error', new Blob([body],{type:'application/json'}));
      else fetch('/api/client-error',{method:'POST',headers:{'Content-Type':'application/json'},body,keepalive:true}); }catch(e){} }
  window.addEventListener('error', e=>report('error', e.message, e.error&&e.error.stack));
  window.addEventListener('unhandledrejection', e=>report('unhandledrejection', (e.reason&&e.reason.message)||e.reason, e.reason&&e.reason.stack));
})();
const money = n => '$' + Math.round(n).toLocaleString();
const money2 = n => '$' + (Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
// Escape user-supplied strings before inserting into innerHTML
function esc(s){ const d=document.createElement('div');d.textContent=String(s??'');return d.innerHTML; }
// Embed a JS value inside a double-quoted onclick="" safely: JSON.stringify's double quotes
// would otherwise close the attribute early. &quot; is HTML-decoded back to " before the JS runs.
function ja(v){ return JSON.stringify(v).replace(/"/g,'&quot;'); }
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;$('toast').appendChild(t);setTimeout(()=>t.remove(),3000);}
// ── 👁 Show/hide on every password field — auto-applied, including modals created later ──
function pwToggle(inp){
  if(inp.dataset.pwt)return; inp.dataset.pwt='1';
  const wrap=document.createElement('div');
  wrap.style.cssText='position:relative;display:inline-block;vertical-align:middle;width:'+(inp.style.width||'100%');
  if(inp.style.width)inp.style.width='100%';
  inp.parentNode.insertBefore(wrap,inp); wrap.appendChild(inp); inp.style.paddingRight='36px';
  const b=document.createElement('button'); b.type='button'; b.tabIndex=-1; b.textContent='👁'; b.setAttribute('aria-label','Show password');
  b.style.cssText='position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;opacity:.55;padding:2px 5px;line-height:1';
  b.onclick=()=>{const s=inp.type==='password'; inp.type=s?'text':'password'; b.textContent=s?'🙈':'👁'; b.setAttribute('aria-label',s?'Hide password':'Show password'); inp.focus();};
  wrap.appendChild(b);
}
document.querySelectorAll('input[type=password]').forEach(pwToggle);
new MutationObserver(ms=>{for(const m of ms)for(const n of m.addedNodes){if(n.nodeType!==1)continue;if(n.matches&&n.matches('input[type=password]'))pwToggle(n);if(n.querySelectorAll)n.querySelectorAll('input[type=password]').forEach(pwToggle);}}).observe(document.body,{childList:true,subtree:true});
// ── CSV export: views stash their rows at render time; the button downloads them ──
window._csv={};
function csvBtn(key,rows,label){window._csv[key]=rows||[];return `<button class="btn sm sec" style="text-transform:none;letter-spacing:0" onclick="dlCSV('${key}')" title="Download as CSV (opens in Excel)">⬇ ${label||'CSV'}</button>`;}
function dlCSV(key){
  const rows=window._csv[key]||[]; if(!rows.length)return toast('Nothing to export yet');
  const cols=[...new Set(rows.flatMap(r=>Object.keys(r)))];
  const escv=v=>{const s=v==null?'':String(v);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
  const csv=[cols.join(','),...rows.map(r=>cols.map(c=>escv(r[c])).join(','))].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=key+'-'+new Date().toISOString().slice(0,10)+'.csv';a.click();URL.revokeObjectURL(a.href);
}
async function api(path, opts={}){
  // Accept:json is required — without it, endpoints that content-negotiate (e.g.
  // /api/auth/qbo) fall back to a 302 redirect, which fetch follows cross-origin and
  // dies with "Failed to fetch". Every api() response is parsed as JSON anyway.
  const h = {'Content-Type':'application/json','Accept':'application/json'};
  if(TOKEN) h.Authorization='Bearer '+TOKEN;
  const r = await fetch(API+path,{...opts,headers:h});
  const d = await r.json().catch(()=>({}));
  if(r.status===401 && d.qboReconnectRequired){const e=new Error(d.error);e.qboReconnectRequired=true;throw e;}
  // A 401 on the login call is a bad username/password — surface the server's real message
  // instead of the generic "session expired" (which also wrongly implies you were logged in).
  if(r.status===401 && path.includes('/auth/login')) throw new Error(d.error||'Invalid username or password');
  if(r.status===401){logout();throw new Error('Session expired');}
  if(r.status===402 && d.qboFeatureUnavailable){const e=new Error(d.error);e.qboFeatureUnavailable=true;throw e;}
  if(!r.ok) throw new Error(d.error||('HTTP '+r.status));
  return d;
}
const canEdit = () => ME && (ME.role==='admin'||ME.role==='editor');
const isAdmin = () => ME && ME.role==='admin';
// All job titles the signed-in user holds (multi-role), with fallback to the primary title.
const myTitles = () => (ME && (ME.titles&&ME.titles.length?ME.titles:(ME.title?[ME.title]:[]))) || [];
const hasTitle = (...names) => myTitles().some(t=>names.includes(t));
const canSell = () => ME && (ME.role==='admin' || hasTitle('Sales','Rep Specialist','General Manager'));

// ---- login ----
async function login(){
  try{
    const d = await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:$('liUser').value.trim(),password:$('liPass').value})});
    TOKEN=d.token;ME=d.user;
    localStorage.setItem('staffToken',TOKEN);localStorage.setItem('staffName',ME.name||''); // survive refreshes / phone relaunches
    $('login').classList.add('hidden');$('app').classList.remove('hidden');
    page=ME.workstation?'standup':'dashboard'; // floor workers land on their day, not a dashboard
    render();toast('Welcome, '+ME.name.split(' ')[0]+'!');maybeTv();
  }catch(e){$('liErr').textContent=e.message;}
}
function logout(){TOKEN=null;ME=null;localStorage.removeItem('staffToken');localStorage.removeItem('staffName');$('app').classList.add('hidden');$('login').classList.remove('hidden');}
$('liPass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
// Restore the session on load — before this existed, every refresh meant logging in again.
(async()=>{
  const saved=localStorage.getItem('staffToken');
  if(!saved)return;
  TOKEN=saved;
  try{ const d=await api('/api/auth/me'); ME=d.user;
    page=ME.workstation?'standup':'dashboard'; // floor workers land on their day
    $('login').classList.add('hidden'); $('app').classList.remove('hidden'); render(); maybeTv(); }
  catch(e){ /* expired or revoked — api() already cleared the session */ }
})();

// ---- nav/render ----
const NAV=[['dashboard','📊 Dashboard'],['orders','🔨 Production Flow'],['standup','📣 Stand-Up'],['mywork','📜 My Work'],['daily','📋 Daily Update'],['performance','📈 Performance'],['neworder','➕ New Order'],['customers','🏬 Customers & Dealers'],['parts','📦 Parts Master'],['predict','🤖 Predictive Ordering'],['pos','🧾 Purchase Orders'],['boms','🧩 BOMs & Cost'],['inventory','📈 Inventory Value'],['accounting','💵 Accounting'],['trailers','🚛 Trailers & Warranty'],['printcenter','🖨️ Print Center'],['boatadmin','🚤 Boat Builder'],['testdata','🧪 Test Data'],['team','👷 Team & Payroll'],['timeoff','📅 Schedule & Time Off'],['outcomes','🎯 Goals & Outcomes'],['wins','🎉 Wins'],['forecast','🔮 Forecasting & Planning'],['notify','💬 Notifications'],['support','🆘 Support'],['users','👤 Users & Roles']];
function canSee(section){
  if(isAdmin()) return true;
  if(!ME.sections) return true; // null = all sections (admin)
  return ME.sections.includes(section);
}
function navVisible(n){
  if(n[0]==='users') return isAdmin();
  if(n[0]==='neworder') return canSell()&&canSee('neworder');
  if(n[0]==='printcenter') return hasTitle('Office Manager','General Manager')||isAdmin();
  if(n[0]==='boatadmin') return hasTitle('Office Manager','General Manager')||isAdmin();
  if(n[0]==='testdata') return isAdmin();
  return canSee(n[0]);
}
// Nav grouped into collapsible sections so the long list isn't overwhelming. Each group only shows
// if the user can see at least one item in it; collapsed state persists per browser.
const NAV_LABEL = Object.fromEntries(NAV);
const NAV_GROUPS = [
  ['', ['dashboard']],
  ['Production', ['orders','standup','mywork','daily','performance','trailers','printcenter']],
  ['Sales', ['neworder','boatadmin','customers']],
  ['Inventory', ['parts','boms','inventory','predict','pos']],
  ['Finance', ['accounting','forecast']],
  ['People', ['team','timeoff','outcomes','wins']],
  ['Updates', ['notify','support']],
  ['Admin', ['users','testdata']],
];
function renderNav(){
  const collapsed=JSON.parse(localStorage.getItem('navCollapsed')||'{}');
  let html='';
  for(const [label,keys] of NAV_GROUPS){
    const vis=keys.filter(k=>navVisible([k]));
    if(!vis.length) continue;
    const items=vis.map(k=>`<button class="${page===k?'active':''}" onclick="go('${k}')">${NAV_LABEL[k]}</button>`).join('');
    if(!label){ html+=items; continue; }
    // A collapsed group can never hide the page you're ON, and shows how many items it holds —
    // so a collapsed "Admin" reads as "Admin (2) ▸", not as Users & Roles having vanished.
    const col=!!collapsed[label]&&!keys.includes(page);
    html+=`<div class="navgroup"><button class="navhdr" onclick="toggleNavGroup('${label}')">${label}${col?` <span style="opacity:.6">(${vis.length})</span>`:''}<span class="navchev">${col?'▸':'▾'}</span></button>${col?'':items}</div>`;
  }
  $('nav').innerHTML=html;
  $('whoName').textContent=ME.name;
  $('whoPill').innerHTML=`<span class="pill ${ME.role}">${(ME.titles||[ME.title]).filter(Boolean).join(', ')||ME.role}</span>`;

function toggleNavGroup(label){

// ── 📺 TV mode: hands-free rotation of the big-board views for a wall display ──
// Start it from Performance (📺 button) or open the app with ?tv=1; it survives refreshes
// (localStorage), so a dedicated shop TV comes back up in TV mode on its own.
const TV_VIEWS=['orders','standup','performance'];
let _tvTimer=null,_tvIdx=0;
function startTvMode(){
  if(_tvTimer)return;
  const secs=Number(localStorage.getItem('tvSeconds'))||45;
  document.body.classList.add('tv'); localStorage.setItem('tvMode','1');
  let b=document.getElementById('tvExit');
  if(!b){b=document.createElement('button');b.id='tvExit';b.textContent='✕ Exit TV';b.onclick=stopTvMode;document.body.appendChild(b);}
  _tvIdx=0; go(TV_VIEWS[0]);
  _tvTimer=setInterval(()=>{_tvIdx=(_tvIdx+1)%TV_VIEWS.length;go(TV_VIEWS[_tvIdx]);},secs*1000); // each rotation re-fetches = always-live data
  toast('📺 TV mode — rotating every '+secs+'s (Esc exits)');
}
function stopTvMode(){
  if(_tvTimer){clearInterval(_tvTimer);_tvTimer=null;}
  localStorage.removeItem('tvMode'); document.body.classList.remove('tv');
  const b=document.getElementById('tvExit'); if(b)b.remove(); render();
}
function maybeTv(){ if(localStorage.getItem('tvMode')==='1'||location.search.indexOf('tv=1')>=0)startTvMode(); }
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&_tvTimer)stopTvMode();});

// 📧 Weekly digest on demand: preview who gets it, confirm, send. (Mondays it sends itself.)
async function sendDigestNow(){
  try{
    const p=await api('/api/admin/digest/send',{method:'POST',body:JSON.stringify({dryRun:true})});
    const who=(p.recipients||[]).map(r=>r.name).join(', ')||'nobody — no admins/managers have an email on file';

// ── Global search (Cmd+K / Ctrl+K): jump to an order, VIN, customer, part, or model ──
let gsItems=[],gsSel=0,gsTimer=null;
function openSearch(){
  if($('gsBg')){$('gsInput').focus();return;}
  const d=document.createElement('div');d.id='gsBg';d.className='modal-bg';
  d.onclick=e=>{if(e.target===d)closeSearch();};
  d.innerHTML=`<div class="modal" style="max-width:560px;padding:14px">
    <input id="gsInput" class="inp" placeholder="Search orders, VINs, customers, parts, models…" autocomplete="off" style="width:100%;font-size:15px;padding:11px 12px">
    <div id="gsOut" style="margin-top:10px;max-height:55vh;overflow:auto"><p class="muted" style="font-size:12px;margin:4px 2px">Type at least 2 characters · ↑↓ to choose · Enter to open · Esc to close</p></div>
  </div>`;
  document.body.appendChild(d);
  const inp=$('gsInput');
  inp.oninput=()=>{clearTimeout(gsTimer);gsTimer=setTimeout(runSearch,180);};
  inp.onkeydown=e=>{
    if(e.key==='ArrowDown'){e.preventDefault();moveGsSel(1);}
    else if(e.key==='ArrowUp'){e.preventDefault();moveGsSel(-1);}
    else if(e.key==='Enter'){e.preventDefault();const it=gsItems[gsSel];if(it)pickGs(it);}
  };
  inp.focus();
}
function closeSearch(){const d=$('gsBg');if(d)d.remove();gsItems=[];gsSel=0;}
function moveGsSel(dir){if(!gsItems.length)return;gsSel=(gsSel+dir+gsItems.length)%gsItems.length;paintGsSel();}
function paintGsSel(){document.querySelectorAll('.gs-item').forEach((el,i)=>{el.style.background=i===gsSel?'var(--panel2)':'';el.style.borderColor=i===gsSel?'var(--accent)':'var(--line)';if(i===gsSel)el.scrollIntoView({block:'nearest'});});}
async function runSearch(){
  const q=($('gsInput')?.value||'').trim(),out=$('gsOut');if(!out)return;
  if(q.length<2){out.innerHTML='<p class="muted" style="font-size:12px;margin:4px 2px">Type at least 2 characters.</p>';gsItems=[];return;}
  let r;try{r=await api('/api/search?q='+encodeURIComponent(q));}catch(e){out.innerHTML=`<p class="msg err" style="display:block">${esc(e.message)}</p>`;return;}
  const screens=NAV.filter(n=>navVisible(n)&&n[1].toLowerCase().includes(q.toLowerCase())).slice(0,3);
  gsItems=[
    ...screens.map(n=>({icon:'🧭',label:n[1].replace(/^\S+\s/,''),sub:'open screen',act:()=>go(n[0])})),
    ...r.orders.map(o=>({icon:'🔨',label:`${o.id} — ${o.customer||'(no customer)'}`,sub:`${o.model||''} · ${o.stage}`,act:()=>orderDetail(o.id)})),
    ...r.units.map(u=>({icon:'🚛',label:u.vin,sub:`${u.model||''}${u.orderId?' · order '+u.orderId:''}`,act:u.orderId?()=>orderDetail(u.orderId):()=>go('trailers')})),
    ...r.customers.map(c=>({icon:'🏬',label:c.name,sub:c.kind||'',act:()=>go('customers')})),
    ...r.parts.map(p=>({icon:'📦',label:p.id,sub:p.name||'',act:()=>go('parts')})),
    ...r.models.map(m=>({icon:'🧩',label:m.name,sub:m.id,act:()=>go('boms')})),
  ];
  gsSel=0;
  out.innerHTML=gsItems.length?gsItems.map((it,i)=>`<div class="gs-item" onclick="pickGsIdx(${i})" style="display:flex;gap:10px;align-items:center;padding:9px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;cursor:pointer">
    <span>${it.icon}</span><div style="min-width:0"><b style="font-size:13.5px">${esc(it.label)}</b><div class="muted" style="font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(it.sub)}</div></div></div>`).join('')
    :'<p class="muted" style="font-size:13px">No matches.</p>';
  paintGsSel();
}
function pickGsIdx(i){const it=gsItems[i];if(it)pickGs(it);}
function pickGs(it){closeSearch();it.act();}
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){if(ME){e.preventDefault();openSearch();}}
  else if(e.key==='Escape'&&$('gsBg'))closeSearch();
});

  try{
    await (map[page]||viewDash)();

      pa.insertAdjacentHTML('beforeend',`<button class="btn sm sec help-btn" onclick="showHelp('${page}')" title="How to use this section" style="margin-left:6px">? Help</button>`);

      <h3 style="margin:0 0 6px">Couldn't load this page</h3>
      <p class="muted" style="margin:0 0 12px">${esc(e.message||'Something went wrong.')}</p>
      <button class="btn" onclick="render()">↻ Retry</button></div>`;

}

    <h4 style="color:var(--accent);margin:14px 0 6px">Scanning a vendor invoice</h4>

  trailers:{title:'🚛 Trailers & Warranty',body:`
    <p>The per-trailer registry plus build history and warranty. Three tabs: <strong>VINs</strong>, <strong>By Dealer</strong> (completed inventory), and <strong>Warranty Claims</strong>. Click any trailer row to open its full record.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Assigning VINs</h4>

      <li>The <strong>Awaiting VINs</strong> card lists orders whose trailers don't all have VINs yet (shows assigned / quantity).</li>
      <li>Click <strong>Assign VINs</strong> on an order — one compliant VIN is generated per trailer and the units move into the registry.</li>
      <li>VIN assignment requires <strong>Accounting</strong> access. Everyone with Trailers access can view the registry.</li>
    </ol>
    <h4 style="color:var(--accent);margin:14px 0 6px">VIN format</h4>
    <p>Each VIN is a standard 17 characters: your WMI (manufacturer code) + a model descriptor + a calculated check digit + the model-year code + plant code + a sequential serial. The check digit is computed automatically so every VIN validates.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">VIN Settings</h4>
    <p>Click <strong>⚙ VIN Settings</strong> (Accounting only) to set your <strong>WMI</strong> — the 3-character manufacturer code NHTSA assigns you — and your plant code. Set the real WMI before issuing live VINs; it defaults to a placeholder.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Build history (per trailer)</h4>
    <p>Open a trailer and log each major step — <strong>parts built, metal bent, painted, finished, QC passed</strong> — recording who did it. The date &amp; time stamp automatically. This is your accountability trail: if a claim comes in, you can see exactly who built that trailer.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Warranty registration</h4>
    <p>On a trailer, click <strong>Register warranty</strong> to record the owner and term (months). Status shows <strong>In warranty</strong> or <strong>Expired</strong> automatically based on the term.</p>
    <h4 style="color:var(--accent);margin:14px 0 6px">Warranty claims</h4>
    <ol>
      <li>Open the trailer → <strong>+ New claim</strong>. Describe the issue, add parts used (cost pulled from the parts master), and enter labor &amp; shipping.</li>
      <li>The claim totals <strong>parts + labor + shipping</strong>. Resolve it when the repair is done.</li>

  timeoff:{title:'📅 Schedule & Time Off',body:`

  forecast:{title:'🔮 Forecasting & Planning',body:`

function showHelp(section){
  const h=HELP[section];
  if(!h)return modal('Help','<p class="muted">No guide available for this section yet.</p>');
  const style=`<style>.help-body h4{font-size:13px;margin:14px 0 5px}.help-body ul,.help-body ol{padding-left:18px;color:var(--muted);font-size:13px;line-height:1.7}.help-body li{margin-bottom:4px}.help-body p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:10px}.help-body strong{color:var(--text)}.help-body code{background:var(--bg);padding:1px 4px;border-radius:4px;font-size:12px}</style>`;
  modal(h.title,style+`<div class="help-body" style="max-height:65vh;overflow-y:auto;padding-right:4px">${h.body}</div>`);
}

// ── Action Inbox ─────────────────────────────────────────────────────────────
function greeting(){const h=new Date().getHours();return h<12?'Good morning':h<18?'Good afternoon':'Good evening';}
function renderInbox(items){
  const first=(ME.name||'').split(' ')[0];
  const head=`<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <h3 style="margin:0;font-size:16px;color:var(--txt);text-transform:none;letter-spacing:0">👋 ${greeting()}, ${esc(first)}</h3>
      ${items.length?`<span class="badge b-low">${items.length} thing${items.length===1?'':'s'} need you</span>`:`<span class="badge b-ok">All caught up</span>`}</div>`;
  if(!items.length){
    return `<div class="card" style="border-color:var(--green);margin-bottom:16px">${head}
      <p class="muted" style="margin:10px 0 0">✅ Nothing needs your attention right now. Nicely done.</p></div>`;
  }
  const rows=items.map((i,idx)=>`<div style="display:flex;align-items:center;gap:12px;padding:11px 0;${idx<items.length-1?'border-bottom:1px solid var(--panel2)':''}">
      <span style="font-size:20px;line-height:1">${i.icon}</span>
      <span style="flex:1">${esc(i.label)}</span>
      <button class="btn sm" onclick="go('${i.link}')">Open →</button>
    </div>`).join('');
  return `<div class="card" style="border-color:var(--accent);margin-bottom:16px">${head}
    <div style="margin-top:6px">${rows}</div></div>`;
}

async function viewDash(){
  $('pTitle').textContent='Dashboard';$('pSub').textContent='Phase 1 — single source of truth (live from the database)';$('pActions').innerHTML='';
  const [inv,models,inbox]=await Promise.all([api('/api/inventory/summary'),api('/api/models'),api('/api/inbox').catch(()=>({items:[]}))]);
  const avgMargin=models.reduce((s,m)=>s+m.margin,0)/models.length*100;
  $('content').innerHTML=`
   ${renderInbox(inbox.items||[])}
   <div class="banner">✅ Connected to the live API and database. Every figure below is computed server-side from stored data.</div>
   <div class="grid g4">
    ${kpi('Inventory value',money(inv.totalValue),inv.skuCount+' SKUs on hand')}
    ${kpi('Trailer models',models.length,inv.manufactured+' make / '+inv.purchased+' buy parts')}
    ${kpi('Avg gross margin',avgMargin.toFixed(1)+'%','across all models')}
    ${kpi('Below reorder',inv.belowReorder,'parts need attention')}
   </div>
   <div class="card" style="margin-top:16px"><h3>Model cost & margin</h3>
   <table><thead><tr><th>Model</th><th>Category</th><th class="right">Material</th><th class="right">Labor</th><th class="right">Total cost</th><th class="right">Price</th><th class="right">Margin</th></tr></thead><tbody>
   ${models.map(m=>`<tr><td><b>${m.id}</b> ${m.name}</td><td>${m.category}</td><td class="right">${money(m.material)}</td><td class="right">${money(m.laborCost)}</td><td class="right"><b>${money(m.totalCost)}</b></td><td class="right">${money(m.price)}</td><td class="right" style="color:${m.margin<0?'var(--red)':m.margin>.3?'var(--green)':'var(--yellow)'}">${(m.margin*100).toFixed(1)}%</td></tr>`).join('')}
   </tbody></table></div>`;
}

async function viewParts(){
  $('pTitle').textContent='Parts Master';$('pSub').textContent='Live parts, costs and on-hand — '+(canEdit()?'click a cost to edit':'read-only');
  $('pActions').innerHTML=canEdit()?`<button class="btn" onclick="addMakePart()">➕ Add Make Part</button> <button class="btn sec" onclick="previewQBItems()">⬇ Import from QuickBooks</button>`:'';
  const allParts=await api('/api/parts');
  const parts=allParts.filter(p=>p.active!==false);
  const inactive=allParts.filter(p=>p.active===false).sort((a,b)=>String(a.name||a.id).toLowerCase().localeCompare(String(b.name||b.id).toLowerCase()));
  $('content').innerHTML=`
   <div id="qbItemsPanel" style="display:none;margin-bottom:14px"></div>
   <div class="card"><h3>Parts (${parts.length}) ${csvBtn('parts_master',allParts)}</h3>
   <table><thead><tr><th>Part</th><th>Type</th><th>Vendor</th><th class="right">On hand</th><th class="right">Reorder</th><th class="right">Unit cost</th><th class="right">Ext. value</th><th class="center">Status</th>${canEdit()?'<th></th>':''}</tr></thead><tbody>
   ${parts.map(p=>`<tr>
     <td><b>${esc(p.id)}</b><br><span class="muted" style="font-size:11px">${esc(p.name)}</span></td>
     <td>${p.type==='M'?'<span class="badge b-mfg">MAKE</span>':'<span class="badge b-buy">BUY</span>'}</td>
     <td style="font-size:12px">${canEdit()?`<a class="lnk" onclick="editPartVendor('${p.id}','${p.vendorId||''}')">${esc(p.vendor||'— assign —')}</a>`:esc(p.vendor||'')}${p.vendorStatus==='pending'?' <span class="badge b-low" style="font-size:9px">pending</span>':''}</td>
     <td class="right">${p.onHand}</td><td class="right">${p.reorder}</td>
     <td class="right">${canEdit()?`<a class="lnk" onclick="editCost('${p.id}',${p.cost})">${money2(p.cost)}</a>`:money2(p.cost)}</td>
     <td class="right">${money(p.extValue)}</td>
     <td class="center"><span class="badge ${p.status==='ok'?'b-ok':p.status==='low'?'b-low':'b-below'}">${p.status}</span></td>
     ${canEdit()?`<td class="right" style="white-space:nowrap"><button class="btn sm sec" onclick="receive('${p.id}')">Receive</button> <button class="btn sm sec" onclick="inactivatePart('${p.id}')">Inactivate</button></td>`:''}
   </tr>`).join('')}
   </tbody></table></div>
   ${canEdit()&&inactive.length?`<div class="card"><h3>Inactive parts (${inactive.length})</h3>
     <p class="muted" style="font-size:12px;margin-bottom:10px">Hidden from the parts list above — app only, not changed in QuickBooks. Pick one to bring it back.</p>
     <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
       <select id="reactivateSel" style="flex:1;min-width:240px;padding:8px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)">
         ${inactive.map(p=>`<option value="${esc(p.id)}">${esc(p.name||p.id)} — ${esc(p.id)}</option>`).join('')}
       </select>
       <button class="btn" onclick="reactivatePart()">Reactivate</button>
     </div></div>`:''}`;
}
async function inactivatePart(id){ try{await api('/api/parts/'+id,{method:'PATCH',body:JSON.stringify({active:false})});toast('Part inactivated');viewParts();}catch(e){toast(e.message);} }
async function reactivatePart(){ const sel=$('reactivateSel'); const id=sel?sel.value:''; if(!id)return; try{await api('/api/parts/'+id,{method:'PATCH',body:JSON.stringify({active:true})});toast('Part reactivated');viewParts();}catch(e){toast(e.message);} }
async function editPartVendor(partId,currentVendorId){
  let vendors; try{ vendors=await api('/api/vendors'); }catch(e){ return toast(e.message); }
  const opts=vendors.map(v=>`<option value="${esc(v.id)}"${v.id===currentVendorId?' selected':''}>${esc(v.name)}${v.status==='pending'?' (pending approval)':v.status==='rejected'?' (rejected)':''}</option>`).join('');
  modal('Assign vendor',`
    <p class="muted" style="font-size:12px">Vendors sync from QuickBooks — search or pick from the list below.</p>
    <div class="field"><label>Vendor</label>
      <select id="pvSel" class="inp">
        <option value="">— none —</option>
        ${opts}
      </select>
    </div>
    <div id="pvNewBox" style="display:none;margin-top:10px;padding:10px;border:1px solid var(--line);border-radius:8px">
      <div class="field"><label>New vendor name *</label><input id="pvNewName" class="inp" placeholder="Acme Trailer Supply"></div>
      <div class="row">
        <div class="field"><label>Lead time (days)</label><input id="pvNewLead" class="inp" type="number" min="0" value="7"></div>
        <div class="field"><label>Terms</label><input id="pvNewTerms" class="inp" placeholder="Net 30"></div>
      </div>
    </div>
    ${isAdmin()?`<p style="margin-top:10px"><a class="lnk" id="pvToggleLink" onclick="togglePvNew()">+ Add a new vendor</a></p>`:''}
    <div class="row" style="gap:8px;margin-top:12px">
      <button class="btn" id="pvSaveBtn" onclick="saveEditPartVendor('${partId}')">Save</button>
      <button class="btn sec" onclick="closeModal()">Cancel</button>
    </div>

function bomCrDesc(cr){
  const p=cr.payload||{};
  switch(cr.op){
    case 'update_qty':  return `Change <b>${esc(p.partName||p.partId)}</b> qty: ${p.oldQty} → <b>${p.newQty}</b>`;
    case 'add_part':    return `Add part <b>${esc(p.partName||p.partId)}</b> × ${p.qty}`;
    case 'remove_part': return `Remove <b>${esc(p.partName||p.partId)}</b> from BOM`;
    case 'update_labor':return `Change <b>${esc(p.ws)}</b>: ${p.oldHours}h@$${p.oldRate} → ${p.newHours}h@$${p.newRate}`;
    case 'add_labor':   return `Add labor step <b>${esc(p.ws)}</b>: ${p.hours}h @ $${p.rate}/hr`;
    case 'remove_labor':return `Remove labor step <b>${esc(p.ws)}</b>`;
    default: return esc(cr.op);
  }
}

  modal('✅ QC — '+esc(vin),`

    <div class="row" style="gap:8px;margin-top:8px;flex-wrap:wrap">

      <button class="btn sec" onclick="closeModal()">Cancel</button>
    </div>`);

function qcReadPhotos(){
  const files=[...($('qcPhotos').files||[])].slice(0,4);
  return Promise.all(files.map(f=>new Promise((res,rej)=>{
    if(f.size>8*1024*1024)return rej(new Error(f.name+' is over 8 MB — snap a smaller photo'));
    const r=new FileReader(); r.onload=()=>res({dataUrl:r.result,name:f.name}); r.onerror=()=>rej(new Error('Could not read '+f.name)); r.readAsDataURL(f);
  })));
}
async function qcSend(unitId,orderId,vin){
  const boxes=[...document.querySelectorAll('.qcChk')];
  if(boxes.some(b=>!b.checked))return toast('Every checklist item must be ticked to pass — or flag rework.');
  const btn=$('qcPassBtn'); btn.disabled=true; btn.textContent='Saving…';
  try{
    const photos=(await qcReadPhotos()).map(p=>p.dataUrl);
    await api('/api/trailers/'+encodeURIComponent(unitId)+'/qc',{method:'POST',body:JSON.stringify({confirmed:true,photos,note:($('qcNote').value||'').trim()})});
    closeModal(); toast('✔ '+vin+' passed QC'+(photos.length?' — '+photos.length+' photo(s) saved':'')); viewStandup();
  }catch(e){ btn.disabled=false; btn.textContent='✔ Pass QC'; toast(e.message); }
}
async function qcFail(unitId,vin){
  const missed=[...document.querySelectorAll('.qcChk')].map((b,i)=>b.checked?null:(window._qcItems||[])[i]).filter(Boolean);
  const note=($('qcNote').value||'').trim();
  if(!confirm('Flag '+vin+' for rework? The Shop Manager gets alerted with the failed items.'))return;
  try{ await api('/u/'+unitId+'/problem',{method:'POST',body:JSON.stringify({reason:'Rework needed',note:('QC failed: '+(missed.join('; ')||'see note')+(note?' — '+note:'')).slice(0,300)})});
    closeModal(); toast('🚨 Rework flagged — the Shop Manager has been alerted'); viewStandup();
  }catch(e){ toast(e.message); }
}

// ── ⏲ Time survey: put hours & minutes on completed work — audits BOM labor + part costs ──
function timeSurveyModal(p){
  window._tsLines=[...p.stages.map(s=>({kind:'stage',...s})),...p.parts.map(x=>({kind:'part',...x}))];
  const hm=(i,mins)=>`<span style="white-space:nowrap"><input id="ts_h_${i}" type="number" min="0" max="99" value="${Math.floor((mins||0)/60)}" style="width:52px;padding:6px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)"> h
    <input id="ts_m_${i}" type="number" min="0" max="59" step="5" value="${Math.round(((mins||0)%60)/5)*5}" style="width:52px;padding:6px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)"> m</span>`;
  modal('⏲ Quick time check — how long did these take?',`
    <p class="muted" style="font-size:12.5px">Rough is fine — this is what keeps BOM labor and made-part costs honest. Trailer lines start at the BOM estimate: correct them to reality.</p>
    ${window._tsLines.map((l,i)=>`<div style="display:flex;gap:10px;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);flex-wrap:wrap">
      <span style="font-size:13px;flex:1;min-width:170px">${l.kind==='stage'?'🚛':'🔩'} ${esc(l.description)}</span>${hm(i,l.kind==='stage'?l.prefillMinutes:0)}
    </div>`).join('')||'<p class="muted">Nothing pending.</p>'}
    <div style="margin-top:10px"><b style="font-size:12.5px">Anything else that took time?</b>
    ${[0,1,2].map(j=>`<div style="display:flex;gap:10px;align-items:center;justify-content:space-between;padding:5px 0;flex-wrap:wrap">
      <input id="ts_o_${j}" placeholder="${j===0?'e.g. shop cleanup, forklift repair':'…'}" style="flex:1;min-width:170px;padding:7px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)">${hm('o'+j,0)}
    </div>`).join('')}</div>
    <div class="row" style="gap:8px;margin-top:12px">
      <button class="btn" onclick="tsSend()">✓ Done — account my hours</button>
      <button class="btn sec" onclick="closeModal();viewStandup()">Later</button>
    </div>`);
}
async function tsSend(){
  const mins=i=>{const h=Number($('ts_h_'+i)?.value)||0,m=Number($('ts_m_'+i)?.value)||0;return h*60+m;};
  const lines=window._tsLines.map((l,i)=>({...l,minutes:mins(i)}));
  for(const j of [0,1,2]){const d=($('ts_o_'+j)?.value||'').trim();const m=mins('o'+j);if(d&&m>0)lines.push({kind:'other',description:d,minutes:m});}
  try{ const r=await api('/api/timesurvey',{method:'POST',body:JSON.stringify({lines})});
    closeModal(); toast('⏲ '+Math.floor(r.totalMinutes/60)+'h '+(r.totalMinutes%60)+'m accounted — thanks, this keeps the BOMs honest'); viewStandup(); }
  catch(e){ toast(e.message); }
}

// ── 📜 My Work — each person's own completed-work record over any window ──
function mwRange(preset){
  const t=new Date(); const iso=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  if(preset==='week'){ const d=new Date(t); const dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow); return {from:iso(d),to:iso(t)}; } // Monday start
  if(preset==='month') return {from:iso(t).slice(0,8)+'01',to:iso(t)};
  return {from:iso(t).slice(0,4)+'-01-01',to:iso(t)}; // year
}

async function savePassword(id){

// ============ PHASE 2: ORDERS / FULFILLMENT / DEALERS ============
function modal(title,html){const d=document.createElement('div');d.className='modal-bg';d.id='modalBg';d.onclick=e=>{if(e.target===d)d.remove();};d.innerHTML=`<div class="modal"><h2 style="margin-bottom:14px">${title}</h2>${html}</div>`;document.body.appendChild(d);}
function closeModal(){const m=$('modalBg');if(m)m.remove();}

let ordFilter='All', ordView='board';
const canReorder=()=>ME&&(ME.role==='admin'||hasTitle('Sales','Rep Specialist','General Manager','Shop Manager','Office Manager'));
function stageBadge(s){const m={'Quote':'b-low','Confirmed':'b-buy','Scheduled':'b-buy','Build':'b-mfg','Paint/Powder Coat':'b-low','Finish':'b-buy','Ready':'b-ok'};return `<span class="badge ${m[s]||'b-buy'}">${esc(s)}</span>`;}
async function viewOrders(){
  $('pTitle').textContent='Production Flow';
  $('pSub').textContent=ordView==='queue'?('Production priority — '+(canReorder()?'use ↑ ↓ to resequence':'read-only')):('Production Flow pipeline — '+(canEdit()?'drag a card to change its stage':'read-only'));
  $('pActions').innerHTML=(canEdit()?`<button class="btn sm sec" onclick="wipLimitsModal()" title="Cap how many orders may sit in each production stage">🚧 WIP limits</button> `:'')+(canSell()?`<button class="btn" onclick="go('neworder')">➕ New Order</button>`:'');
  const {stages,orders,wipLimits={}}=await api('/api/orders');
  window._wipLimits=wipLimits;
  const live=orders.filter(o=>!o.billed && o.stage!=='Cancelled'); // invoiced + rejected drop off the board
  const rejected=orders.filter(o=>o.stage==='Cancelled');
  const viewToggle=`<div class="tabs" style="margin-bottom:12px"><button class="${ordView==='board'?'active':''}" onclick="ordView='board';viewOrders()">🗂️ Board</button><button class="${ordView==='queue'?'active':''}" onclick="ordView='queue';viewOrders()">🏭 Production Queue</button>${rejected.length?`<button class="${ordView==='rejected'?'active':''}" onclick="ordView='rejected';viewOrders()">🚫 Rejected <span style="opacity:.7">${rejected.length}</span></button>`:''}</div>`;
  if(ordView==='queue'){ $('content').innerHTML=viewToggle+renderQueue(orders); return; }
  if(ordView==='rejected'){ $('content').innerHTML=viewToggle+renderRejected(rejected); return; }
  const types=['All',...Array.from(new Set(live.map(o=>o.type)))];
  const filtered=ordFilter==='All'?live:live.filter(o=>o.type===ordFilter);
  const tabs=`<div class="tabs">${types.map(t=>`<button class="${ordFilter===t?'active':''}" onclick="ordFilter='${t}';viewOrders()">${t}<span style="opacity:.7;margin-left:5px">${t==='All'?live.length:live.filter(o=>o.type===t).length}</span></button>`).join('')}</div>`;
  const board=`<div class="kanban">${stages.map(st=>`
    <div class="col" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="dropOrder(event,'${st}')">
      <h4>${esc(st)}${(()=>{const n=filtered.filter(o=>o.stage===st).length,lim=wipLimits[st];return lim?`<span style="${n>lim?'background:#c0392b;color:#fff;border-radius:9px;padding:0 7px;font-weight:700':''}" title="WIP limit ${lim}">${n}/${lim}${n>lim?' ⚠':''}</span>`:`<span>${n}</span>`;})()}</h4>
      ${filtered.filter(o=>o.stage===st).map(o=>`<div class="ocard" draggable="${canEdit()}" ondragstart="window._drag='${o.id}'" onclick="orderDetail('${o.id}')">
        <div class="t"><span>${o.andonOpen?'<span title="shop-floor problem open">🔴</span> ':''}${o.id}</span><span>${money(o.revenue)}</span></div>
        <div>${o.qty}× ${o.model}</div>
        <div class="muted" style="font-size:11px">${o.customer} · <span class="badge b-buy">${o.type}</span></div></div>`).join('')}
    </div>`).join('')}</div>`;
  // per-type summary
  const summary=`<div class="card" style="margin-top:16px"><h3>Fulfillment by trailer type</h3>
   <table><thead><tr><th>Type</th><th class="right">Open orders</th><th class="right">Units</th><th class="right">Backlog value</th></tr></thead><tbody>
   ${Array.from(new Set(live.map(o=>o.type))).map(t=>{const os=live.filter(o=>o.type===t);return `<tr><td><b>${t}</b></td><td class="right">${os.length}</td><td class="right">${os.reduce((a,o)=>a+o.qty,0)}</td><td class="right">${money(os.reduce((a,o)=>a+o.revenue,0))}</td></tr>`;}).join('')}
   </tbody></table></div>`;
  $('content').innerHTML=viewToggle+tabs+board+summary;
}
async function resolveAndon(id,orderId){
  const resolution=prompt('How was it resolved? (optional — leave blank to just clear it)');
  if(resolution===null)return; // cancelled
  try{ await api('/api/andon/'+id+'/resolve',{method:'POST',body:JSON.stringify({resolution:resolution.trim()||undefined})});
    toast('Problem resolved'); closeModal(); orderDetail(orderId); }
  catch(e){ toast(e.message); }
}
function wipLimitsModal(){
  const lim=window._wipLimits||{};
  const stages=['Scheduled','Build','Paint/Powder Coat','Finish'];
  modal('🚧 WIP limits — cap each stage',`
    <p class="muted" style="font-size:12.5px;line-height:1.5">The kanban rule: when a stage is at its limit, <b>finish before starting</b>. Less work-in-progress = shorter lead times (and the Performance screen pushes the Shop Manager when a limit is breached). Blank = no limit.</p>
    ${stages.map((s,i)=>`<div class="field"><label>${esc(s)} — max orders</label><input id="wl${i}" class="inp" type="number" min="0" value="${lim[s]||''}" placeholder="no limit"></div>`).join('')}

async function saveWipLimits(){
  const stages=['Scheduled','Build','Paint/Powder Coat','Finish'];
  const body={}; stages.forEach((s,i)=>{const v=Number($('wl'+i).value); if(v>0)body[s]=v;});
  try{ await api('/api/wip-limits',{method:'POST',body:JSON.stringify(body)}); closeModal(); toast('WIP limits saved'); viewOrders(); }
  catch(e){ toast(e.message); }
}
function renderQueue(orders){
  const q=orders.filter(o=>o.stage!=='Ready' && !o.billed).sort((a,b)=>(a.prodSeq??1e9)-(b.prodSeq??1e9));
  window._queue=q.map(o=>o.id);
  const editable=canReorder();
  if(!q.length) return `<div class="card"><p class="muted">No active orders in the production queue. Orders appear here until they reach Ready.</p></div>`;
  const rows=q.map((o,i)=>`<tr>
      <td class="center" style="font-weight:700;color:var(--accent);font-size:15px">${i+1}</td>
      <td><b>${esc(o.id)}</b><br><span class="muted" style="font-size:11px">${esc(o.customer||'')}</span></td>
      <td>${o.qty}× ${esc(o.model||'')} <span class="badge b-buy" style="margin-left:4px">${esc(o.type||'')}</span></td>
      <td>${stageBadge(o.stage)}</td>
      <td class="right muted" style="font-size:12px">${esc(o.due?String(o.due).slice(0,10):'—')}</td>
      ${editable?`<td class="center" style="white-space:nowrap">
        <button class="btn sm sec" ${i===0?'disabled':''} onclick="moveQueue(${i},-1)" title="Move up">↑</button>
        <button class="btn sm sec" ${i===q.length-1?'disabled':''} onclick="moveQueue(${i},1)" title="Move down">↓</button></td>`:''}
    </tr>`).join('');
  return `<div class="card"><h3>Production Queue <span class="muted" style="text-transform:none;letter-spacing:0">— built top to bottom · ${q.length} active</span></h3>
    <table><thead><tr><th class="center">#</th><th>Order</th><th>Trailer</th><th>Stage</th><th class="right">Due</th>${editable?'<th class="center">Move</th>':''}</tr></thead>
    <tbody>${rows}</tbody></table>
    ${editable?'':`<p class="muted" style="font-size:12px;margin-top:10px">🔒 Reordering is limited to Sales, the GM, the Shop Manager, and the Office Manager.</p>`}</div>`;
}
async function moveQueue(i,dir){
  const arr=window._queue; if(!arr) return;
  const j=i+dir; if(j<0||j>=arr.length) return;
  [arr[i],arr[j]]=[arr[j],arr[i]];
  try{ await api('/api/orders/production-order',{method:'POST',body:JSON.stringify({order:arr})}); toast('Production queue updated'); viewOrders(); }
  catch(e){ toast(e.message); }
}
async function dropOrder(e,stage){
  e.preventDefault();e.currentTarget.classList.remove('over');
  if(!canEdit()||!window._drag)return;
  const id=window._drag;window._drag=null;
  try{ await api('/api/orders/'+id+'/stage',{method:'PATCH',body:JSON.stringify({stage})});
    toast(stage==='Ready'?id+' → Ready (waiting to invoice)':id+' → '+stage); viewOrders();
  }catch(err){toast(err.message);}
}

    ${(b.options||[]).map(op=>`<div style="font-size:13px;display:flex;justify-content:space-between;padding:1px 0"><span class="muted">${esc(op.group_name)}</span><span>${esc(op.choice_name)}${Number(op.dealer_price)>0?` <span class="muted">+$${Number(op.dealer_price).toLocaleString()}</span>`:''}</span></div>`).join('')}

    <div style="margin-bottom:10px"><span class="badge b-buy">${esc(o.type)}</span> <span class="muted">${o.qty}× ${esc(o.model)} · ${esc(o.stage)} · due ${o.due||'—'}</span></div>
    ${o.cancelReason?`<div style="background:rgba(192,57,43,.14);border:1px solid rgba(192,57,43,.35);border-radius:8px;padding:8px 11px;font-size:13px;margin-bottom:10px;color:#f0a0a0">🚫 Rejected: ${esc(o.cancelReason)}</div>`:''}
    ${(o.andons||[]).filter(a=>!a.resolved).map(a=>`<div style="background:rgba(192,57,43,.14);border:1px solid rgba(192,57,43,.35);border-radius:8px;padding:8px 11px;font-size:13px;margin-bottom:10px">
      🚨 <b>${esc(a.reason)}</b>${a.raisedBy?` — ${esc(a.raisedBy)}`:''}${a.note?`: ${esc(a.note)}`:''} <span class="muted">(${a.blockedHours}h open)</span>
      ${canEdit()?`<button class="btn sm" style="margin-left:8px" onclick="resolveAndon(${a.id},'${o.id}')">✓ Resolve</button>`:''}

      ${kpi('Revenue',money(o.revenue),'')}${kpi('Rep',o.rep||'—','')}</div>

        <span class="muted" style="min-width:118px;font-size:11px">${new Date(t.at).toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</span>
        <span><b>${esc(t.event)}</b>${t.by?` <span class="muted">— ${esc(t.by)}</span>`:''}${t.workstation?` <span class="muted" style="font-size:10.5px">@ ${esc(t.workstation)}</span>`:''}</span>
      </div>`).join('')}

    <h3 style="font-size:12px;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Parts required</h3>

    </div>`:''}`);
}

  $('pActions').innerHTML=(canEdit()&&act.some(r=>r.type==='P'))?`<button class="btn" onclick="autoPO()">⚡ Auto-generate all POs</button>`:'';
  $('content').innerHTML=`
   <div class="banner">🤖 Demand-weighted reorder model with lead-time safety stock. Inputs: open orders, per-model daily capacity, vendor lead times, cushion stock. <b>${summary.critical}</b> critical · <b>${summary.warning}</b> reorder-soon · <b>${summary.ok}</b> healthy.</div>
   ${act.length?`<div class="card"><h3>Recommended actions (${act.length})</h3>
   <table><thead><tr><th>Part</th><th class="right">On hand</th><th class="right">On order</th><th class="right">Demand</th><th class="right">Days cover</th><th class="right">Lead</th><th class="right">Suggest</th><th>Order by</th><th class="center">Action</th>${canEdit()?'<th></th>':''}</tr></thead><tbody>
   ${act.map(r=>`<tr>
     <td><b>${r.id}</b> <span class="muted">${r.name}</span></td>
     <td class="right">${r.onHand}</td><td class="right">${r.onOrder||''}</td><td class="right">${r.demand||''}</td>
     <td class="right" style="color:${(r.daysCover!=null&&r.daysCover<r.lead)?'var(--red)':'var(--yellow)'}">${r.daysCover!=null?r.daysCover+'d':'—'}</td>
     <td class="right">${r.type==='M'?'build':r.lead+'d'}</td>
     <td class="right"><b>${r.suggestQty}</b></td>
     <td>${r.orderBy}</td>
     <td class="center"><span class="badge ${r.sev==='crit'?'b-below':'b-low'}">${r.action}</span></td>
     ${canEdit()?`<td class="right">${r.type==='M'?`<span class="muted" style="font-size:11px">build order</span>`:`<button class="btn sm" onclick="makePO('${r.id}',${r.suggestQty})">Create PO</button>`}</td>`:''}

async function receivePO(id){
  try{await api('/api/po/'+id+'/receive',{method:'POST'});toast(id+' received — inventory updated');viewPOs();}catch(e){toast(e.message);}
}
async function decideApproval(token, decision){
  const note=decision==='rejected'?prompt('Reason for rejection (optional):',''):null;
  if(decision==='rejected'&&note===null)return;
  try{
    const r=await api('/api/approvals/'+token+'/decide',{method:'POST',body:JSON.stringify({decision,note:note||null})});
    toast(decision==='approved'?`Approved — ${r.outcome==='fully_approved'?'PO is now open':'next approver notified'}`:`Rejected — PO cancelled`);
    viewPOs();
  }catch(e){toast(e.message);}
}
function showAddRule(){$('addRuleForm').style.display=$('addRuleForm').style.display==='none'?'block':'none';}
async function saveRule(){
  try{
    await api('/api/approval-rules',{method:'POST',body:JSON.stringify({
      type:$('ruleType').value, minAmount:$('ruleMin').value?Number($('ruleMin').value):null,
      maxAmount:$('ruleMax').value?Number($('ruleMax').value):null,
      approverId:$('ruleApprover').value, seq:Number($('ruleSeq').value||1),
      notify:$('ruleNotify').value, label:$('ruleLabel').value||null
    })});
    toast('Rule saved');viewPOs();
  }catch(e){toast(e.message);}
}
async function toggleRule(id,active){
  try{await api('/api/approval-rules/'+id,{method:'PATCH',body:JSON.stringify({active})});}catch(e){toast(e.message);viewPOs();}
}
async function deleteRule(id){
  if(!confirm('Delete this approval rule?'))return;
  try{await api('/api/approval-rules/'+id,{method:'DELETE'});toast('Rule deleted');viewPOs();}catch(e){toast(e.message);}
}
function showNewVendor(){$('newVendorModal').style.display=$('newVendorModal').style.display==='none'?'block':'none';}
async function saveNewVendor(){
  const name=$('vName').value.trim();if(!name){toast('Vendor name required');return;}
  try{
    const r=await api('/api/vendors',{method:'POST',body:JSON.stringify({name,leadDays:Number($('vLead').value||7),terms:$('vTerms').value||null})});
    $('vendorOut').innerHTML=r.status==='pending'?`<span class="badge b-low">Submitted for approval — approvers have been notified</span>`:`<span class="badge b-ok">Vendor added (no approval rules active)</span>`;
    toast(r.status==='pending'?'Vendor submitted for approval':'Vendor created');
  }catch(e){toast(e.message);}
}

function syncTcSel(){ _tcRows.forEach((r,idx)=>{ const s=$('tcSel'+idx); if(s) r.qbItemId=s.value||null; }); }
function renderTrailerCostModal(){
  const opts=(sel)=>`<option value="">— no QB item —</option>`+_tcItems.map(i=>`<option value="${esc(i.id)}" ${i.id===sel?'selected':''}>${esc(i.name)} (cost ${money(i.cost)})</option>`).join('');
  const body=`
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:14px;cursor:pointer"><input type="checkbox" id="tcLabor" ${_tcIncludeLabor?'checked':''} onchange="syncTcSel();_tcIncludeLabor=this.checked;renderTrailerCostModal()"> Include labor in cost <span class="muted">(unchecked = material only)</span></label>
    <table><thead><tr><th>Trailer</th><th class="right">App cost</th><th>QuickBooks item</th><th class="right">QB cost now</th><th class="center"></th></tr></thead><tbody>
    ${_tcRows.map((r,idx)=>{const appCost=_tcIncludeLabor?r.totalCost:r.material; const willChange=r.qbItemId&&r.currentQbCost!=null&&Math.abs(r.currentQbCost-appCost)>0.005; const badge=!r.qbItemId?'<span class="badge b-buy">map →</span>':(r.currentQbCost==null?'<span class="badge b-low">set</span>':(willChange?'<span class="badge b-low">update</span>':'<span class="badge b-ok">match</span>'));
      return `<tr>
      <td><b>${esc(r.model)}</b></td>
      <td class="right">${money(appCost)}</td>
      <td><select id="tcSel${idx}" style="font-size:12px;max-width:260px">${opts(r.qbItemId)}</select></td>

    </tr>`;}).join('')}
    </tbody></table>
    <p class="muted" style="font-size:11px;margin-top:8px">Writes each trailer's app cost to its QuickBooks item <b>Cost</b> (PurchaseCost). Sales price is never changed. The chosen mapping is saved for next time.</p>

  modal('Push trailer costs to QuickBooks',body);
}
async function doPushTrailerCosts(){
  syncTcSel();
  const items=_tcRows.filter(r=>r.qbItemId).map(r=>({modelId:r.modelId,qbItemId:r.qbItemId}));
  if(!items.length) return toast('Pick a QuickBooks item for at least one trailer');
  if(!confirm(`Push ${items.length} trailer cost${items.length>1?'s':''} to QuickBooks? This updates each item's Cost in your live QuickBooks.`)) return;
  try{
    const r=await api('/api/accounting/trailer-costs/push',{method:'POST',body:JSON.stringify({includeLabor:_tcIncludeLabor,items})});
    closeModal();
    const fails=r.results.filter(x=>!x.ok);
    toast(`Pushed ${r.pushed}/${r.total} trailer cost${r.total>1?'s':''} to QuickBooks`+(fails.length?` — ${fails.length} failed`:''));
    modal('Push results',`<table><thead><tr><th>Trailer</th><th>Result</th></tr></thead><tbody>${r.results.map(x=>`<tr><td>${esc(x.model||x.modelId)}</td><td>${x.ok?`<span class="badge b-ok">✓ Cost set to ${money(x.cost)}</span>`:`<span class="badge b-low">✗ ${esc(x.error||'failed')}</span>`}</td></tr>`).join('')}</tbody></table><div class="row" style="margin-top:10px"><button class="btn sec" onclick="closeModal()">Close</button></div>`);
  }catch(e){ toast(e.message); }
}

async function uploadDoc(){
  const title=$('docTitle').value.trim(),f=$('docFile').files[0];
  if(!title||!f){ toast('Title and file are required'); return; }
  if(f.size>10*1024*1024){ toast('File must be under 10 MB'); return; }
  const dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});
  try{ await api('/api/documents',{method:'POST',body:JSON.stringify({title,category:$('docCat').value.trim()||undefined,modelId:$('docModel').value||undefined,dataUrl})}); toast('Document posted'); viewTrailers(); }
  catch(e){ toast(e.message); }

function addClaimPart(){
  const sel=$('wcPartSel'); if(!sel||!sel.value) return;
  const opt=sel.options[sel.selectedIndex];
  window._claimParts.push({partId:sel.value,name:opt.getAttribute('data-name'),qty:Number($('wcPartQty').value)||1,unitCost:Number(opt.getAttribute('data-cost'))||0});
  renderClaimParts();
}
function renderClaimParts(){
  const el=$('wcPartList'); if(!el) return;
  el.innerHTML=(window._claimParts||[]).map((p,i)=>`<span class="chip">${esc(p.name)} ×${p.qty} ($${Math.round(p.unitCost*p.qty)}) <a class="lnk" onclick="window._claimParts.splice(${i},1);renderClaimParts()">✕</a></span>`).join('')||'<span class="muted" style="font-size:12px">No parts added.</span>';
}
async function saveClaim(trailerId){
  try{ await api('/api/warranty/claims',{method:'POST',body:JSON.stringify({trailerId,issue:$('wcIssue').value||undefined,laborCost:Number($('wcLabor').value)||0,shippingCost:Number($('wcShip').value)||0,parts:window._claimParts||[]})});
    toast('Warranty claim filed'); openTrailerDetail(trailerId);
  }catch(e){ toast(e.message); }
}

}

async function qboTest(){
  toast('Testing QuickBooks…');
  try{
    const r=await api('/api/qbo/test');
    const steps=r.steps||[];
    const label={refresh_token_available:'Refresh token available',token_refresh:'Exchange token with Intuit',company_info:'Read company info'};
    const rows=steps.map(s=>{
      const ok=s.ok?'<span style="color:#2e7d32;font-weight:700">✓</span>':'<span style="color:#c0392b;font-weight:700">✗</span>';
      let detail='';
      if(s.step==='refresh_token_available') detail=s.ok?('from '+esc(s.source||'')):'no token — click Connect QuickBooks';
      else if(s.step==='token_refresh') detail=s.ok?'tokens received':('HTTP '+(s.status||'?')+' — '+esc(String(s.body||'').slice(0,180)));
      else if(s.step==='company_info') detail=s.ok?('Company: <b>'+esc(String(s.body))+'</b>'):('HTTP '+(s.status||'?')+' — '+esc(String(s.body||'').slice(0,180)));
      return '<tr><td style="padding:5px 8px;vertical-align:top">'+ok+'</td><td style="padding:5px 8px;white-space:nowrap;vertical-align:top">'+(label[s.step]||esc(s.step))+'</td><td style="padding:5px 8px;color:var(--muted);font-size:12px">'+detail+'</td></tr>';
    }).join('');
    const allOk=steps.length>0&&steps.every(s=>s.ok);
    const head=allOk?'<p style="color:#2e7d32;font-weight:600;margin-bottom:10px">✓ Connected'+(r.realmId?' — realm '+esc(r.realmId)+' ('+esc(r.env||'')+')':'')+'</p>':'<p style="color:#c0392b;font-weight:600;margin-bottom:10px">✗ Not fully connected — see steps below</p>';
    const tip=allOk?'':'<p class="muted" style="margin-top:10px;font-size:12px">If the token step failed, click <b>Re-authorize</b> to reconnect.</p>';
    modal('QuickBooks connection test',head+'<table style="width:100%;border-collapse:collapse">'+rows+'</table>'+tip);
  }catch(e){ toast(e.message); }
}

async function pullFromQB(what){
  const el=$('pullOut'); if(el) el.innerHTML='<span class="muted">Syncing from QuickBooks…</span>';
  try{
    const r=await api('/api/qbo/pull',{method:'POST',body:JSON.stringify({what:what||['customers','items','invoices']})});
    const res=r.results;
    const rows=Object.entries(res).map(([k,v])=>`<tr><td style="text-transform:capitalize">${k}</td><td class="right">${v.created??'-'} created</td><td class="right">${v.updated??'-'} updated</td>${v.skipped!=null?`<td class="right">${v.skipped} skipped</td>`:''}</tr>`).join('');
    if(el) el.innerHTML=`<table><thead><tr><th>Category</th><th class="right">Created</th><th class="right">Updated</th><th class="right">Skipped</th></tr></thead><tbody>${rows}</tbody></table>`;
    toast('QuickBooks pull complete');
  }catch(e){if(el)el.innerHTML=qboErrBanner(e);toast(e.message);}
}

function sparkline(hist,fc){
  const all=[...hist,...fc];const max=Math.max(1,...all);const W=240,H=44,n=all.length;
  const pts=all.map((v,i)=>`${(i/(n-1)*W).toFixed(1)},${(H-v/max*H).toFixed(1)}`).join(' ');
  const split=((hist.length-1)/(n-1)*W).toFixed(1);
  return `<svg width="${W}" height="${H}" style="overflow:visible"><polyline points="${pts}" fill="none" stroke="#5aa9ff" stroke-width="2"/><line x1="${split}" y1="0" x2="${split}" y2="${H}" stroke="var(--line)" stroke-dasharray="3 3"/></svg>`;
}
