      <div id="supMessages" style="min-height:120px;max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:12px;padding:4px"></div>
      <div style="display:flex;gap:8px">
        <input id="supInput" class="inp" style="flex:1" placeholder="Describe your issue…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendSupportMsg();}">
        <button class="btn" id="supSendBtn" onclick="sendSupportMsg()">Send</button>
      </div>
      <div id="supEscalateBar" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <span class="muted" style="font-size:13px">Still not resolved?</span>
        <button class="btn sm sec" onclick="escalateTicket('bug')">🐛 Submit as Bug Report</button>
        <button class="btn sm sec" onclick="escalateTicket('feature')">💡 Submit as Feature Request</button>
      </div>
    </div>
  </div>

  ${isAdmin() && queueTickets.length ? `
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="margin:0">Review Queue <span class="badge b-low">${queueTickets.length}</span></h3>
      <span class="muted" style="font-size:12px">Escalated by users — approve to implement, reject to decline</span>
    </div>
    <table><thead><tr><th>User</th><th>Type</th><th>Title</th><th>Status</th><th>Submitted</th><th></th></tr></thead><tbody>
    ${queueTickets.map(t=>`<tr>
      <td>${t.user_name||'—'}</td>
      <td>${typeBadge(t.type)}</td>
      <td style="max-width:260px">${t.title}</td>
      <td>${statusBadge(t.status)}</td>
      <td class="muted" style="font-size:12px">${new Date(t.created_at).toLocaleDateString()}</td>
      <td><button class="btn sm sec" onclick="viewTicketDetail('${t.id}')">Review</button></td>
    </tr>`).join('')}
    </tbody></table>
  </div>` : ''}

  ${isAdmin() ? `
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="margin:0">All Tickets</h3>
      <select class="inp" style="width:auto;font-size:12px" onchange="filterSupportTickets(this.value)">
        <option value="">All statuses</option>
        <option value="open">Open</option>
        <option value="escalated">Escalated</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
        <option value="done">Done</option>
      </select>
    </div>
    <div id="allTicketsTable">` + renderTicketTable(myTickets) + `</div>
  </div>` : `
  <div class="card">
    <h3>My Tickets</h3>
    ${myTickets.length ? renderTicketTable(myTickets) : '<p class="muted">No tickets yet.</p>'}
  </div>`}

  <div id="supDetailPanel" style="display:none"></div>`;
}

function renderTicketTable(tickets){
  if(!tickets.length) return '<p class="muted">No tickets.</p>';
  const statusBadge = s => {
    const map={open:'b-ok','ai-resolved':'b-ok',escalated:'b-low',approved:'b-buy',rejected:'b-crit',done:'b-ok'};
    return `<span class="badge ${map[s]||'b-ok'}" style="font-size:10px">${s}</span>`;
  };
  return `<table><thead><tr><th>Type</th><th>Title</th><th>Status</th><th>Date</th><th></th></tr></thead><tbody>
  ${tickets.map(t=>`<tr>
    <td><span class="badge b-low" style="font-size:10px">${t.type}</span></td>
    <td>${t.title}</td>
    <td>${statusBadge(t.status)}</td>
    <td class="muted" style="font-size:12px">${new Date(t.created_at).toLocaleDateString()}</td>
    <td><button class="btn sm sec" onclick="viewTicketDetail('${t.id}')">View</button></td>
  </tr>`).join('')}
  </tbody></table>`;
}

async function filterSupportTickets(status){
  const url = status ? `/api/support/tickets?status=${status}` : '/api/support/tickets';
  const tickets = await api(url);
  const el=$('allTicketsTable'); if(el) el.innerHTML=renderTicketTable(tickets);
}

async function startSupportChat(type='question'){
  const title = type==='feature'
    ? (prompt('Briefly describe the feature you want:')||'').trim()
    : (prompt('Briefly describe your issue:')||'').trim();
  if(!title) return;
  const id = (await api('/api/support/tickets',{method:'POST',body:JSON.stringify({type,title})})).id;
  SUP_TICKET = id;
  const panel=$('supChatPanel'); if(panel) panel.style.display='block';
  const titleEl=$('supChatTitle'); if(titleEl) titleEl.textContent=title;
  renderSupMessages([]);
  $('supEscalateBar') && ($('supEscalateBar').style.display='none');
  $('supInput') && $('supInput').focus();
  if(type==='feature'){
    await sendSupportMsg('I would like to request a new feature: '+title);
  }
}

function closeSupportChat(){
  SUP_TICKET=null;
  const p=$('supChatPanel'); if(p) p.style.display='none';
}

function renderSupMessages(messages){
  const el=$('supMessages'); if(!el) return;
  if(!messages.length){el.innerHTML='<p class="muted" style="text-align:center;margin:20px 0">How can I help you today?</p>';return;}
  el.innerHTML=messages.map(m=>{
    const isUser=m.role==='user', isAI=m.role==='ai';
    const bg=isUser?'var(--accent)':isAI?'var(--surface)':'rgba(245,158,11,.1)';
    const align=isUser?'flex-end':'flex-start';
    const label=isUser?'You':isAI?'AI Support':'Admin';
    return `<div style="display:flex;flex-direction:column;align-items:${align};max-width:85%;align-self:${align}">
      <span style="font-size:10px;color:var(--muted);margin-bottom:3px;${isUser?'text-align:right':''}">${label}</span>
      <div style="background:${bg};border-radius:12px;padding:10px 14px;font-size:14px;line-height:1.5;white-space:pre-wrap">${m.body.replace(/</g,'&lt;')}</div>
    </div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

async function sendSupportMsg(prefill){
  if(!SUP_TICKET){toast('No active support chat');return;}
  if(SUP_SENDING) return;
  const inp=$('supInput');
  const message=prefill||(inp?inp.value.trim():'');
  if(!message) return;
  if(inp&&!prefill) inp.value='';
  SUP_SENDING=true;
  const btn=$('supSendBtn'); if(btn){btn.disabled=true;btn.textContent='...';}

  // Optimistically add user message
  const msgEl=$('supMessages');
  if(msgEl){
    const t=await api('/api/support/tickets/'+SUP_TICKET);
    renderSupMessages(t.messages.concat([{role:'user',body:message}]));
    const typing=document.createElement('div');
    typing.id='supTyping';typing.style.cssText='color:var(--muted);font-size:13px;padding:4px 0';
    typing.textContent='AI is typing…';
    msgEl.appendChild(typing);msgEl.scrollTop=msgEl.scrollHeight;
  }

  try{
    const r=await api('/api/support/tickets/'+SUP_TICKET+'/chat',{method:'POST',body:JSON.stringify({message})});
    const t=await api('/api/support/tickets/'+SUP_TICKET);
    renderSupMessages(t.messages);
    if(r.suggestEscalate){
      const bar=$('supEscalateBar');if(bar) bar.style.display='flex';
    }
  }catch(e){toast(e.message);}
  finally{
    SUP_SENDING=false;
    const b=$('supSendBtn');if(b){b.disabled=false;b.textContent='Send';}
    const ty=document.getElementById('supTyping');if(ty)ty.remove();
    if(inp) inp.focus();
  }
}

async function escalateTicket(type){
  if(!SUP_TICKET) return;
  try{
    await api('/api/support/tickets/'+SUP_TICKET+'/escalate',{method:'POST',body:JSON.stringify({type})});
    toast(type==='bug'?'Bug report submitted — thank you!':'Feature request submitted — thank you!');
    const bar=$('supEscalateBar');if(bar) bar.style.display='none';
    closeSupportChat();
    viewSupport();
  }catch(e){toast(e.message);}
}

async function viewTicketDetail(id){
  const t=await api('/api/support/tickets/'+id);
  const panel=$('supDetailPanel');if(!panel)return;
  panel.style.display='block';
  panel.scrollIntoView({behavior:'smooth'});
  const statusBadge=s=>{const map={open:'b-ok','ai-resolved':'b-ok',escalated:'b-low',approved:'b-buy',rejected:'b-crit',done:'b-ok'};return`<span class="badge ${map[s]||'b-ok'}">${s}</span>`;};
  panel.innerHTML=`<div class="card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <h3 style="margin:0;flex:1">${t.title}</h3>
      ${statusBadge(t.status)}
      <button class="btn sm sec" onclick="$('supDetailPanel').style.display='none'">Close</button>
    </div>
    ${t.ai_summary?`<div class="banner" style="margin-bottom:12px"><strong>AI Summary:</strong> ${t.ai_summary}</div>`:''}
    <div style="display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto;margin-bottom:16px">
    ${t.messages.map(m=>{
      const isUser=m.role==='user',isAI=m.role==='ai';
      const bg=isUser?'var(--accent)':isAI?'var(--surface)':'rgba(245,158,11,.1)';
      const align=isUser?'flex-end':'flex-start';
      const label=isUser?t.user_name||'User':isAI?'AI Support':'Admin';
      return `<div style="display:flex;flex-direction:column;align-items:${align};max-width:85%;align-self:${align}">
        <span style="font-size:10px;color:var(--muted);margin-bottom:2px">${label}</span>
        <div style="background:${bg};border-radius:10px;padding:8px 12px;font-size:13px;white-space:pre-wrap">${m.body.replace(/</g,'&lt;')}</div>
      </div>`;
    }).join('')}
    </div>
    ${isAdmin()?`
    <div style="border-top:1px solid var(--border);padding-top:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
      <textarea id="supAdminNote" class="inp" rows="2" style="flex:1;min-width:200px" placeholder="Admin note (optional)…">${t.admin_note||''}</textarea>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="btn sm" onclick="adminDecision('${t.id}','approved')">✅ Approve for Implementation</button>
        <button class="btn sm sec" onclick="adminDecision('${t.id}','rejected')">❌ Reject</button>
        <button class="btn sm sec" onclick="adminDecision('${t.id}','done')">✔ Mark Done</button>
      </div>
    </div>`:''}</div>`;
}

async function adminDecision(id, status){
  const note=($('supAdminNote')||{}).value||'';
  await api('/api/support/tickets/'+id,{method:'PATCH',body:JSON.stringify({status,adminNote:note||undefined})});
  toast('Ticket updated');
  viewSupport();
}

// ---- Install to phone (PWA) ----
let deferredInstallPrompt=null;
function isStandalone(){return window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;}
function isIOS(){return /iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;}
function canInstall(){return !isStandalone()&&(!!deferredInstallPrompt||isIOS());}
function refreshInstallButtons(){document.querySelectorAll('.installBtn').forEach(b=>{b.style.display=canInstall()?'':'none';});}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstallPrompt=e;refreshInstallButtons();});
window.addEventListener('appinstalled',()=>{deferredInstallPrompt=null;refreshInstallButtons();});
async function promptInstall(){
  if(deferredInstallPrompt){deferredInstallPrompt.prompt();try{await deferredInstallPrompt.userChoice;}catch(e){}deferredInstallPrompt=null;refreshInstallButtons();return;}
  if(isIOS()){alert('Install on iPhone/iPad:\n\n1. Tap the Share button (□ with an up-arrow) in Safari\n2. Scroll down and tap “Add to Home Screen”\n3. Tap “Add”');return;}
  alert('To install: open this site in Chrome on your phone, then tap the menu (⋮) → “Install app” / “Add to Home screen”.');
}
refreshInstallButtons();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW:', e));
  });
}
// ---- Web push opt-in (staff) ----
function urlB64ToUint8(b){const p='='.repeat((4-b.length%4)%4);const s=(b+p).replace(/-/g,'+').replace(/_/g,'/');const raw=atob(s);return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));}
async function enablePush(subUrl){
  const btn=document.getElementById('pushBtn');
  try{
    if(!('serviceWorker'in navigator)||!('PushManager'in window)){toast('Notifications aren\'t supported on this device.');return;}
    const vk=await (await fetch('/api/push/vapid')).json();
    if(!vk.publicKey){toast('Push isn\'t configured on the server yet.');return;}
    const reg=await navigator.serviceWorker.register('/sw.js'); await navigator.serviceWorker.ready;
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){toast('Notifications are blocked in your browser.');return;}
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(vk.publicKey)});
    await api(subUrl,{method:'POST',body:JSON.stringify(sub)});
    if(btn){btn.textContent='🔔✓';btn.title='Notifications on';btn.disabled=true;}
    toast('🔔 Notifications enabled');
  }catch(e){toast(e.message||'Could not enable notifications');}
}
</script>
