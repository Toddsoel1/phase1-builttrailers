<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Built Trailers</title>

<!-- PWA manifest -->
<link rel="manifest" href="/manifest.json">

<!-- iOS home screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Built Trailers">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">

<!-- Android / theme -->
<meta name="theme-color" content="#ffb347">
<meta name="mobile-web-app-capable" content="yes">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="32x32"  href="/icons/icon-96.png">
<style>
:root{--bg:#0f1419;--panel:#161c24;--panel2:#1d2630;--line:#2a3540;--txt:#e7edf3;--muted:#8b9aa8;--accent:#ff7a18;--green:#3ecf8e;--red:#ff5d5d;--yellow:#ffd166;--blue:#5aa9ff;--mfg:#ba7dff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
.hidden{display:none!important}
.app{display:flex;min-height:100vh}
.sidebar{width:215px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:18px;border-bottom:1px solid var(--line)}.brand h1{font-size:16px}.brand .t{color:var(--accent)}.brand small{color:var(--muted);font-size:11px}
.nav{padding:10px 8px;flex:1}.nav button{width:100%;text-align:left;background:none;border:none;color:var(--muted);padding:10px 12px;border-radius:8px;font-size:13.5px;margin-bottom:2px}
.nav button:hover{background:var(--panel2);color:var(--txt)}.nav button.active{background:linear-gradient(90deg,rgba(255,122,24,.18),transparent);color:var(--txt);font-weight:600;box-shadow:inset 3px 0 0 var(--accent)}
.who{padding:12px;border-top:1px solid var(--line);font-size:12px}.who b{display:block;margin:3px 0}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;text-transform:uppercase}
.pill.admin{background:rgba(255,122,24,.2);color:#ffb347}.pill.editor{background:rgba(90,169,255,.2);color:var(--blue)}.pill.viewer{background:rgba(139,154,168,.2);color:var(--muted)}
.main{flex:1;min-width:0}.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:10}
.topbar h2{font-size:18px}.topbar .sub{color:var(--muted);font-size:12px}
.content{padding:20px 22px}
.grid{display:grid;gap:14px}.g4{grid-template-columns:repeat(4,1fr)}@media(max-width:1000px){.g4{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.card h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.kpi .v{font-size:26px;font-weight:700}.kpi .s{font-size:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px;border-bottom:1px solid var(--line)}
td{padding:8px;border-bottom:1px solid var(--panel2)}tr:hover td{background:var(--panel2)}.right{text-align:right}.center{text-align:center}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}.b-ok{background:rgba(62,207,142,.15);color:var(--green)}.b-low{background:rgba(255,209,102,.15);color:var(--yellow)}.b-below{background:rgba(255,93,93,.15);color:var(--red)}
.b-buy{background:rgba(90,169,255,.15);color:var(--blue)}.b-mfg{background:rgba(186,125,255,.15);color:var(--mfg)}
.btn{background:var(--accent);color:#1a1206;border:none;padding:8px 14px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}.btn.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}.btn.sm{padding:4px 9px;font-size:12px}
input,select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:7px;padding:8px;font-size:13px;font-family:inherit}
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;padding:20px}
.login .box{max-width:840px;width:100%;display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--line);border-radius:16px;overflow:hidden}
@media(max-width:760px){.login .box{grid-template-columns:1fr}}
.login .l{padding:32px;background:var(--panel)}.login .r{padding:22px;background:var(--panel2);max-height:520px;overflow:auto}
.login .field{margin-bottom:12px}.login label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.login input{width:100%}
.err{color:var(--red);font-size:13px;min-height:18px}
a.lnk{color:var(--blue);cursor:pointer}
.banner{background:linear-gradient(100deg,rgba(62,207,142,.12),transparent);border:1px solid rgba(62,207,142,.3);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border-left:4px solid var(--accent);border:1px solid var(--accent);border-radius:9px;padding:11px 15px;z-index:200}
.kanban{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:start}@media(max-width:1200px){.kanban{grid-template-columns:repeat(3,1fr)}}
.col{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px;min-height:80px}
.col h4{font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;justify-content:space-between}
.col.over{border-color:var(--accent);background:var(--panel2)}
.ocard{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px;margin-bottom:7px;cursor:grab;font-size:12px}
.ocard .t{display:flex;justify-content:space-between;font-weight:700;margin-bottom:2px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}.tabs button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer}.tabs button.active{background:var(--accent);color:#1a1206;font-weight:700}
.field{margin-bottom:12px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}.field input,.field select,.field textarea{width:100%}
.row{display:flex;gap:12px}.row>*{flex:1}
.chip{display:inline-block;border:1px solid var(--line);border-radius:20px;padding:4px 10px;font-size:12px;margin:2px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:150;padding:20px}.modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:540px;width:100%;max-height:86vh;overflow:auto}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:860px){.split{grid-template-columns:1fr}}
</style>
</head>
<body>
<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <div class="l">
      <h1 style="font-size:22px">BUILT <span style="color:var(--accent)">TRAILERS</span></h1>
      <div style="color:var(--muted);margin-bottom:20px;font-size:13px">Phase 1 — live hosted environment</div>
      <div class="field"><label>Username</label><input id="liUser" autocomplete="username"></div>
      <div class="field"><label>Password</label><input id="liPass" type="password" autocomplete="current-password"></div>
      <div class="err" id="liErr"></div>
      <button class="btn" style="width:100%" onclick="login()">Sign in</button>
      <p style="color:var(--muted);font-size:11px;margin-top:12px">Secure auth: passwords are bcrypt-hashed in the database; sessions use JWT.</p>
    </div>
    <div class="r">
      <h3 style="font-size:12px;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Demo accounts (click to fill)</h3>
      <div style="color:var(--muted);font-size:12px;margin-bottom:8px">Password for all: <b>built2026</b></div>
      <table id="acctList"><tbody></tbody></table>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app hidden" id="app">
  <aside class="sidebar">
    <div class="brand"><h1>BUILT <span class="t">TRAILERS</span></h1><small>Phase 1 · live</small></div>
    <nav class="nav" id="nav"></nav>
    <div class="who"><div class="muted">Signed in as</div><b id="whoName"></b><span id="whoPill"></span>
      <button class="btn sec sm" style="width:100%;margin-top:8px" onclick="logout()">Log out</button></div>
  </aside>
  <main class="main">
    <div class="topbar"><div><h2 id="pTitle">Dashboard</h2><div class="sub" id="pSub"></div></div><div id="pActions"></div></div>
    <div class="content" id="content"></div>
  </main>
</div>
<div id="toast"></div>

<script>
const API = window.location.origin;
let TOKEN = null, ME = null, page = 'dashboard';
const $ = id => document.getElementById(id);
const money = n => '$' + Math.round(n).toLocaleString();
const money2 = n => '$' + (Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;$('toast').appendChild(t);setTimeout(()=>t.remove(),3000);}
async function api(path, opts={}){
  const h = {'Content-Type':'application/json'};
  if(TOKEN) h.Authorization='Bearer '+TOKEN;
  const r = await fetch(API+path,{...opts,headers:h});
  const d = await r.json().catch(()=>({}));
  if(r.status===401 && d.qboReconnectRequired){const e=new Error(d.error);e.qboReconnectRequired=true;throw e;}
  if(r.status===401){logout();throw new Error('Session expired');}
  if(r.status===402 && d.qboFeatureUnavailable){const e=new Error(d.error);e.qboFeatureUnavailable=true;throw e;}
  if(!r.ok) throw new Error(d.error||('HTTP '+r.status));
  return d;
}
const canEdit = () => ME && (ME.role==='admin'||ME.role==='editor');
const isAdmin = () => ME && ME.role==='admin';
const canSell = () => ME && (ME.role==='admin' || ['Sales','Rep Specialist','General Manager'].includes(ME.title));

// ---- login ----
async function loadAccts(){
  // public hint list (names only) — fetched after we know usernames via a tiny unauthenticated call is not available,
  // so we show the known seed accounts statically for the demo.
  const seed=[['tsoelberg','Todd Soelberg','General Manager','admin'],['mchen','Maria Chen','Shop Manager','admin'],
   ['dolsen','Dave Olsen','Office Manager','admin'],['aruiz','Angela Ruiz','Sales','editor'],
   ['creyes','Carlos Reyes','Boat Lead','editor'],['rmendez','Rosa Mendez','QC Specialist','editor'],
   ['ilender','Investor / Lender','External Viewer','viewer']];
  $('acctList').querySelector('tbody').innerHTML = seed.map(s=>`<tr style="cursor:pointer" onclick="document.getElementById('liUser').value='${s[0]}';document.getElementById('liPass').value='built2026'"><td><b>${s[0]}</b></td><td class="muted">${s[1]}</td><td><span class="pill ${s[3]}">${s[2]}</span></td></tr>`).join('');
}
async function login(){
  try{
    const d = await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:$('liUser').value.trim(),password:$('liPass').value})});
    TOKEN=d.token;ME=d.user;$('login').classList.add('hidden');$('app').classList.remove('hidden');page='dashboard';render();toast('Welcome, '+ME.name.split(' ')[0]+'!');
  }catch(e){$('liErr').textContent=e.message;}
}
function logout(){TOKEN=null;ME=null;$('app').classList.add('hidden');$('login').classList.remove('hidden');}
$('liPass').addEventListener('keydown',e=>{if(e.key==='Enter')login();});

// ---- nav/render ----
const NAV=[['dashboard','📊 Dashboard'],['orders','📋 Orders & Fulfillment'],['neworder','➕ New Order'],['customers','🏬 Customers & Dealers'],['parts','📦 Parts Master'],['predict','🤖 Predictive Ordering'],['pos','🧾 Purchase Orders'],['boms','🧩 BOMs & Cost'],['inventory','📈 Inventory Value'],['accounting','💵 Accounting'],['team','👷 Team & Payroll'],['timeoff','📅 Schedule & Time Off'],['outcomes','🎯 Goals & Outcomes'],['wins','🎉 Wins'],['forecast','🔮 Forecasting & Planning'],['notify','💬 Notifications'],['support','🆘 Support'],['users','👤 Users & Roles']];
function navVisible(n){ if(n[0]==='users') return isAdmin(); if(n[0]==='neworder') return canSell(); return true; }
function renderNav(){
  $('nav').innerHTML=NAV.filter(navVisible).map(n=>`<button class="${page===n[0]?'active':''}" onclick="go('${n[0]}')">${n[1]}</button>`).join('');
  $('whoName').textContent=ME.name;
  $('whoPill').innerHTML=`<span class="pill ${ME.role}">${ME.title||ME.role}</span>`;
}
function go(p){page=p;render();}
async function render(){
  renderNav();
  const map={dashboard:viewDash,orders:viewOrders,neworder:viewNewOrder,customers:viewCustomers,parts:viewParts,predict:viewPredict,pos:viewPOs,boms:viewBoms,inventory:viewInv,accounting:viewAccounting,team:viewTeam,timeoff:viewTimeoff,outcomes:viewOutcomes,wins:viewWins,forecast:viewForecast,notify:viewNotify,support:viewSupport,users:viewUsers};
  try{ await (map[page]||viewDash)(); }catch(e){ $('content').innerHTML=`<div class="card">Error: ${e.message}</div>`; }
}
function kpi(t,v,s){return `<div class="card kpi"><h3>${t}</h3><div class="v">${v}</div><div class="s">${s}</div></div>`;}

async function viewDash(){
  $('pTitle').textContent='Dashboard';$('pSub').textContent='Phase 1 — single source of truth (live from the database)';$('pActions').innerHTML='';
  const [inv,models]=await Promise.all([api('/api/inventory/summary'),api('/api/models')]);
  const avgMargin=models.reduce((s,m)=>s+m.margin,0)/models.length*100;
  $('content').innerHTML=`
   <div class="banner">✅ Connected to the live API and database. Every figure below is computed server-side from stored data.</div>
   <div class="grid g4">
    ${kpi('Inventory value',money(inv.totalValue),inv.skuCount+' SKUs on hand')}
    ${kpi('Trailer models',models.length,inv.manufactured+' make / '+inv.purchased+' buy parts')}
    ${kpi('Avg gross margin',avgMargin.toFixed(1)+'%','across all models')}
    ${kpi('Below reorder',inv.belowReorder,'parts need attention')}
   </div>
   <div class="card" style="margin-top:16px"><h3>Model cost & margin</h3>
   <table><thead><tr><th>Model</th><th>Category</th><th class="right">Material</th><th class="right">Labor</th><th class="right">Total cost</th><th class="right">Price</th><th class="right">Margin</th></tr></thead><tbody>
   ${models.map(m=>`<tr><td><b>${m.id}</b> ${m.name}</td><td>${m.category}</td><td class="right">${money(m.material)}</td><td class="right">${money(m.laborCost)}</td><td class="right"><b>${money(m.totalCost)}</b></td><td class="right">${money(m.price)}</td><td class="right" style="color:${m.margin<0?'var(--red)':m.margin>.3?'var(--green)':'var(--yellow)'}">${(m.margin*100).toFixed(1)}%</td></tr>`).join('')}
   </tbody></table></div>`;
}

async function viewParts(){
  $('pTitle').textContent='Parts Master';$('pSub').textContent='Live parts, costs and on-hand — '+(canEdit()?'click a cost to edit':'read-only');
  $('pActions').innerHTML=canEdit()?`<button class="btn" onclick="previewQBItems()">⬇ Import from QuickBooks</button>`:'';
  const parts=await api('/api/parts');
  $('content').innerHTML=`
   <div id="qbItemsPanel" style="display:none;margin-bottom:14px"></div>
   <div class="card"><h3>Parts (${parts.length})</h3>
   <table><thead><tr><th>Part</th><th>Type</th><th>Vendor</th><th class="right">On hand</th><th class="right">Reorder</th><th class="right">Unit cost</th><th class="right">Ext. value</th><th class="center">Status</th>${canEdit()?'<th></th>':''}</tr></thead><tbody>
   ${parts.map(p=>`<tr>
     <td><b>${p.id}</b><br><span class="muted" style="font-size:11px">${p.name}</span></td>
     <td>${p.type==='M'?'<span class="badge b-mfg">MAKE</span>':'<span class="badge b-buy">BUY</span>'}</td>
     <td style="font-size:12px">${p.vendor||''}</td>
     <td class="right">${p.onHand}</td><td class="right">${p.reorder}</td>
     <td class="right">${canEdit()?`<a class="lnk" onclick="editCost('${p.id}',${p.cost})">${money2(p.cost)}</a>`:money2(p.cost)}</td>
     <td class="right">${money(p.extValue)}</td>
     <td class="center"><span class="badge ${p.status==='ok'?'b-ok':p.status==='low'?'b-low':'b-below'}">${p.status}</span></td>
     ${canEdit()?`<td class="right"><button class="btn sm sec" onclick="receive('${p.id}')">Receive</button></td>`:''}
   </tr>`).join('')}
   </tbody></table></div>`;
}
async function previewQBItems(){
  const panel=$('qbItemsPanel');
  panel.style.display='block';
  panel.innerHTML=`<div class="card"><p class="muted">Loading QuickBooks items…</p></div>`;
  try{
    const items=await api('/api/qbo/preview/items');
    const newCount=items.filter(i=>i.status==='new'&&!i.skip).length;
    const updCount=items.filter(i=>i.status==='update').length;
    panel.innerHTML=`<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <h3>QuickBooks Items &nbsp;<span class="badge b-ok">${newCount} new</span> <span class="badge b-buy">${updCount} updates</span></h3>
        <div style="display:flex;gap:8px">
          <button class="btn sm sec" onclick="$('qbItemsPanel').style.display='none'">Close</button>
          <button class="btn sm" onclick="syncQBItems(null)">Import All</button>
          <button class="btn sm sec" onclick="syncQBItems('selected')">Import Selected</button>
        </div>
      </div>
      <table><thead><tr>
        <th><input type="checkbox" id="qbChkAll" onchange="document.querySelectorAll('.qb-cb').forEach(c=>c.checked=this.checked)"></th>
        <th>QB Item Name</th><th>QB Type</th><th class="right">QB Cost</th><th class="right">Current Cost</th><th>Vendor</th><th>Status</th>
      </tr></thead><tbody>
      ${items.map(i=>`<tr style="${i.skip?'opacity:.45':''}">
        <td><input type="checkbox" class="qb-cb" data-id="${i.qbId}" ${i.skip?'':'checked'}></td>
        <td>${i.name}${i.existingPartId&&i.existingPartId!=='QB-'+i.qbId?`<br><span class="muted" style="font-size:10px">matches ${i.existingPartId}</span>`:''}</td>
        <td><span class="badge ${i.itemType==='Service'?'b-low':'b-buy'}" style="font-size:10px">${i.itemType}</span></td>
        <td class="right">${money2(i.cost)}</td>
        <td class="right">${i.existingCost!=null?money2(i.existingCost):'—'}</td>
        <td style="font-size:12px">${i.vendor||''}</td>
        <td><span class="badge ${i.status==='new'?'b-ok':'b-buy'}">${i.status}</span></td>
      </tr>`).join('')}
      </tbody></table>
      <div id="qbSyncOut" style="margin-top:10px"></div>
    </div>`;
  }catch(e){panel.innerHTML=`<div class="card">${qboErrBanner(e)}</div>`;}
}
async function syncQBItems(mode){
  let ids=null;
  if(mode==='selected'){
    ids=[...document.querySelectorAll('.qb-cb:checked')].map(c=>c.dataset.id);
    if(!ids.length){toast('No items selected');return;}
  }
  const out=$('qbSyncOut');if(out)out.innerHTML='<span class="muted">Syncing…</span>';
  try{
    const r=await api('/api/qbo/pull',{method:'POST',body:JSON.stringify({what:['items'],itemIds:ids})});
    const v=r.results.items;
    if(out)out.innerHTML=`<span class="badge b-ok">${v.created} created &nbsp; ${v.updated} updated &nbsp; ${v.skipped} skipped</span>`;
    toast(`QB items synced — ${v.created} new, ${v.updated} updated`);
    viewParts();
  }catch(e){if(out)out.innerHTML=qboErrBanner(e);toast(e.message);}
}
async function editCost(id,cur){
  const v=prompt('New unit cost for '+id+':',cur);if(v==null)return;
  await api('/api/parts/'+id,{method:'PATCH',body:JSON.stringify({cost:Number(v)})});
  toast('Cost updated — BOMs recalculated.');render();
}
async function receive(id){
  const v=prompt('Quantity received for '+id+':','10');if(v==null)return;
  await api('/api/parts/'+id+'/receive',{method:'POST',body:JSON.stringify({qty:Number(v)})});
  toast('Received '+v+' '+id+'.');render();
}

async function viewBoms(){
  $('pTitle').textContent='BOMs & Cost';$('pSub').textContent='Per-model bill of materials with live cost rollup';$('pActions').innerHTML='';
  const models=await api('/api/models');
  const cats=[...new Set(models.map(m=>m.category))];
  $('content').innerHTML=`<div style="max-width:460px;margin-bottom:14px"><select id="bomSel" onchange="showBom(this.value)" style="width:100%">
    ${cats.map(c=>`<optgroup label="${c}">${models.filter(m=>m.category===c).map(m=>`<option value="${m.id}">${m.id} — ${m.name}</option>`).join('')}</optgroup>`).join('')}
   </select></div><div id="bomBody"></div>`;
  showBom(models[0].id);
}
async function showBom(id){
  const m=await api('/api/models/'+id);
  $('bomBody').innerHTML=`
   <div class="grid g4" style="margin-bottom:14px">
    ${kpi('Material',money(m.material),'parts')}
    ${kpi('Labor',money(m.laborCost),m.laborHrs.toFixed(1)+' hrs @ $'+m.labor[0]?.rate)}
    ${kpi('Total cost',money(m.totalCost),'per unit')}
    ${kpi('Margin',(m.margin*100).toFixed(1)+'%',money(m.marginDollars)+' on '+money(m.price))}
   </div>
   <div class="card"><h3>${m.name} — Bill of Materials</h3>
   <table><thead><tr><th>Part</th><th class="right">Qty</th><th class="right">Unit</th><th class="right">Ext.</th></tr></thead><tbody>

async function checkEuAutoConsent(){

async function savePassword(id){
  const pw=($('cpPw').value||'').trim();
  const pw2=($('cpPw2').value||'').trim();
  if(pw.length<8)return toast('Password must be at least 8 characters');
  if(pw!==pw2)return toast('Passwords do not match');
  const isSelf=ME.id===id;
  const url=isSelf?'/api/users/me/password':'/api/users/'+id;

  try{await api(url,{method,body:JSON.stringify(body)});closeModal();toast('Password updated');}catch(e){toast(e.message);}
}

async function decideApproval(token, decision){
  const note=decision==='rejected'?prompt('Reason for rejection (optional):',''):null;
  if(decision==='rejected'&&note===null)return;
  try{
    const r=await api('/api/approvals/'+token+'/decide',{method:'POST',body:JSON.stringify({decision,note:note||null})});
    toast(decision==='approved'?`Approved — ${r.outcome==='fully_approved'?'PO is now open':'next approver notified'}`:`Rejected — PO cancelled`);
    viewPOs();
  }catch(e){toast(e.message);}
}

  try{
    await api('/api/approval-rules',{method:'POST',body:JSON.stringify({
      type:$('ruleType').value, minAmount:$('ruleMin').value?Number($('ruleMin').value):null,
      maxAmount:$('ruleMax').value?Number($('ruleMax').value):null,

function sparkline(hist,fc){
  const all=[...hist,...fc];const max=Math.max(1,...all);const W=240,H=44,n=all.length;
  const pts=all.map((v,i)=>`${(i/(n-1)*W).toFixed(1)},${(H-v/max*H).toFixed(1)}`).join(' ');
  const split=((hist.length-1)/(n-1)*W).toFixed(1);
  return `<svg width="${W}" height="${H}" style="overflow:visible"><polyline points="${pts}" fill="none" stroke="#5aa9ff" stroke-width="2"/><line x1="${split}" y1="0" x2="${split}" y2="${H}" stroke="var(--line)" stroke-dasharray="3 3"/></svg>`;
}

      <div style="font-size:36px;margin-bottom:8px">💬</div>
      <h3 style="margin:0 0 4px">Get Help</h3>
      <p class="muted" style="margin:0">Chat with AI — instant answers to most questions</p>
    </div>
    <div class="card" style="cursor:pointer;text-align:center;padding:32px 16px" onclick="startSupportChat('feature')">
      <div style="font-size:36px;margin-bottom:8px">💡</div>
      <h3 style="margin:0 0 4px">Request a Feature</h3>
      <p class="muted" style="margin:0">Suggest something new for the app</p>
    </div>
  </div>

  <div id="supChatPanel" style="display:none">
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3 style="margin:0" id="supChatTitle">Support Chat</h3>
        <button class="btn sm sec" onclick="closeSupportChat()">Close</button>
      </div>
      <div id="supMessages" style="min-height:120px;max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:12px;padding:4px"></div>
      <div style="display:flex;gap:8px">
        <input id="supInput" class="inp" style="flex:1" placeholder="Describe your issue…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendSupportMsg();}">
        <button class="btn" id="supSendBtn" onclick="sendSupportMsg()">Send</button>
      </div>
      <div id="supEscalateBar" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <span class="muted" style="font-size:13px">Still not resolved?</span>
        <button class="btn sm sec" onclick="escalateTicket('bug')">🐛 Submit as Bug Report</button>
        <button class="btn sm sec" onclick="escalateTicket('feature')">💡 Submit as Feature Request</button>
      </div>
    </div>
  </div>

  ${isAdmin() && queueTickets.length ? `
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="margin:0">Review Queue <span class="badge b-low">${queueTickets.length}</span></h3>
      <span class="muted" style="font-size:12px">Escalated by users — approve to implement, reject to decline</span>
    </div>
    <table><thead><tr><th>User</th><th>Type</th><th>Title</th><th>Status</th><th>Submitted</th><th></th></tr></thead><tbody>
    ${queueTickets.map(t=>`<tr>
      <td>${t.user_name||'—'}</td>
      <td>${typeBadge(t.type)}</td>
      <td style="max-width:260px">${t.title}</td>
      <td>${statusBadge(t.status)}</td>
      <td class="muted" style="font-size:12px">${new Date(t.created_at).toLocaleDateString()}</td>
      <td><button class="btn sm sec" onclick="viewTicketDetail('${t.id}')">Review</button></td>
    </tr>`).join('')}
    </tbody></table>
  </div>` : ''}

  ${isAdmin() ? `
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <h3 style="margin:0">All Tickets</h3>
      <select class="inp" style="width:auto;font-size:12px" onchange="filterSupportTickets(this.value)">
        <option value="">All statuses</option>
        <option value="open">Open</option>
        <option value="escalated">Escalated</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
        <option value="done">Done</option>
      </select>
    </div>
    <div id="allTicketsTable">` + renderTicketTable(myTickets) + `</div>
  </div>` : `
  <div class="card">
    <h3>My Tickets</h3>
    ${myTickets.length ? renderTicketTable(myTickets) : '<p class="muted">No tickets yet.</p>'}
  </div>`}

  <div id="supDetailPanel" style="display:none"></div>`;
}

function renderTicketTable(tickets){
  if(!tickets.length) return '<p class="muted">No tickets.</p>';
  const statusBadge = s => {
    const map={open:'b-ok','ai-resolved':'b-ok',escalated:'b-low',approved:'b-buy',rejected:'b-crit',done:'b-ok'};
    return `<span class="badge ${map[s]||'b-ok'}" style="font-size:10px">${s}</span>`;
  };
  return `<table><thead><tr><th>Type</th><th>Title</th><th>Status</th><th>Date</th><th></th></tr></thead><tbody>
  ${tickets.map(t=>`<tr>
    <td><span class="badge b-low" style="font-size:10px">${t.type}</span></td>
    <td>${t.title}</td>
    <td>${statusBadge(t.status)}</td>
    <td class="muted" style="font-size:12px">${new Date(t.created_at).toLocaleDateString()}</td>
    <td><button class="btn sm sec" onclick="viewTicketDetail('${t.id}')">View</button></td>
  </tr>`).join('')}
  </tbody></table>`;
}

async function filterSupportTickets(status){
  const url = status ? `/api/support/tickets?status=${status}` : '/api/support/tickets';
  const tickets = await api(url);
  const el=$('allTicketsTable'); if(el) el.innerHTML=renderTicketTable(tickets);
}

async function startSupportChat(type='question'){
  const title = type==='feature'
    ? (prompt('Briefly describe the feature you want:')||'').trim()
    : (prompt('Briefly describe your issue:')||'').trim();
  if(!title) return;
  const id = (await api('/api/support/tickets',{method:'POST',body:JSON.stringify({type,title})})).id;
  SUP_TICKET = id;
  const panel=$('supChatPanel'); if(panel) panel.style.display='block';
  const titleEl=$('supChatTitle'); if(titleEl) titleEl.textContent=title;
  renderSupMessages([]);
  $('supEscalateBar') && ($('supEscalateBar').style.display='none');
  $('supInput') && $('supInput').focus();
  if(type==='feature'){
    await sendSupportMsg('I would like to request a new feature: '+title);
  }
}

function closeSupportChat(){
  SUP_TICKET=null;
  const p=$('supChatPanel'); if(p) p.style.display='none';
}

function renderSupMessages(messages){
  const el=$('supMessages'); if(!el) return;
  if(!messages.length){el.innerHTML='<p class="muted" style="text-align:center;margin:20px 0">How can I help you today?</p>';return;}
  el.innerHTML=messages.map(m=>{
    const isUser=m.role==='user', isAI=m.role==='ai';
    const bg=isUser?'var(--accent)':isAI?'var(--surface)':'rgba(245,158,11,.1)';
    const align=isUser?'flex-end':'flex-start';
    const label=isUser?'You':isAI?'AI Support':'Admin';
    return `<div style="display:flex;flex-direction:column;align-items:${align};max-width:85%;align-self:${align}">
      <span style="font-size:10px;color:var(--muted);margin-bottom:3px;${isUser?'text-align:right':''}">${label}</span>
      <div style="background:${bg};border-radius:12px;padding:10px 14px;font-size:14px;line-height:1.5;white-space:pre-wrap">${m.body.replace(/</g,'&lt;')}</div>
    </div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}

async function sendSupportMsg(prefill){
  if(!SUP_TICKET){toast('No active support chat');return;}
  if(SUP_SENDING) return;
  const inp=$('supInput');
  const message=prefill||(inp?inp.value.trim():'');
  if(!message) return;
  if(inp&&!prefill) inp.value='';
  SUP_SENDING=true;
  const btn=$('supSendBtn'); if(btn){btn.disabled=true;btn.textContent='...';}

  // Optimistically add user message
  const msgEl=$('supMessages');
  if(msgEl){
    const t=await api('/api/support/tickets/'+SUP_TICKET);
    renderSupMessages(t.messages.concat([{role:'user',body:message}]));
    const typing=document.createElement('div');
    typing.id='supTyping';typing.style.cssText='color:var(--muted);font-size:13px;padding:4px 0';
    typing.textContent='AI is typing…';
    msgEl.appendChild(typing);msgEl.scrollTop=msgEl.scrollHeight;
  }

  try{
    const r=await api('/api/support/tickets/'+SUP_TICKET+'/chat',{method:'POST',body:JSON.stringify({message})});
    const t=await api('/api/support/tickets/'+SUP_TICKET);
    renderSupMessages(t.messages);
    if(r.suggestEscalate){
      const bar=$('supEscalateBar');if(bar) bar.style.display='flex';
    }
  }catch(e){toast(e.message);}
  finally{
    SUP_SENDING=false;
    const b=$('supSendBtn');if(b){b.disabled=false;b.textContent='Send';}
    const ty=document.getElementById('supTyping');if(ty)ty.remove();
    if(inp) inp.focus();
  }
}

async function escalateTicket(type){
  if(!SUP_TICKET) return;
  try{
    await api('/api/support/tickets/'+SUP_TICKET+'/escalate',{method:'POST',body:JSON.stringify({type})});
    toast(type==='bug'?'Bug report submitted — thank you!':'Feature request submitted — thank you!');
    const bar=$('supEscalateBar');if(bar) bar.style.display='none';
    closeSupportChat();
    viewSupport();
  }catch(e){toast(e.message);}
}

async function viewTicketDetail(id){
  const t=await api('/api/support/tickets/'+id);
  const panel=$('supDetailPanel');if(!panel)return;
  panel.style.display='block';
  panel.scrollIntoView({behavior:'smooth'});
  const statusBadge=s=>{const map={open:'b-ok','ai-resolved':'b-ok',escalated:'b-low',approved:'b-buy',rejected:'b-crit',done:'b-ok'};return`<span class="badge ${map[s]||'b-ok'}">${s}</span>`;};
  panel.innerHTML=`<div class="card">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <h3 style="margin:0;flex:1">${t.title}</h3>
      ${statusBadge(t.status)}
      <button class="btn sm sec" onclick="$('supDetailPanel').style.display='none'">Close</button>
    </div>
    ${t.ai_summary?`<div class="banner" style="margin-bottom:12px"><strong>AI Summary:</strong> ${t.ai_summary}</div>`:''}
    <div style="display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto;margin-bottom:16px">
    ${t.messages.map(m=>{
      const isUser=m.role==='user',isAI=m.role==='ai';
      const bg=isUser?'var(--accent)':isAI?'var(--surface)':'rgba(245,158,11,.1)';
      const align=isUser?'flex-end':'flex-start';
      const label=isUser?t.user_name||'User':isAI?'AI Support':'Admin';
      return `<div style="display:flex;flex-direction:column;align-items:${align};max-width:85%;align-self:${align}">
        <span style="font-size:10px;color:var(--muted);margin-bottom:2px">${label}</span>
        <div style="background:${bg};border-radius:10px;padding:8px 12px;font-size:13px;white-space:pre-wrap">${m.body.replace(/</g,'&lt;')}</div>
      </div>`;
    }).join('')}
    </div>
    ${isAdmin()?`
    <div style="border-top:1px solid var(--border);padding-top:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center">
      <textarea id="supAdminNote" class="inp" rows="2" style="flex:1;min-width:200px" placeholder="Admin note (optional)…">${t.admin_note||''}</textarea>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="btn sm" onclick="adminDecision('${t.id}','approved')">✅ Approve for Implementation</button>
        <button class="btn sm sec" onclick="adminDecision('${t.id}','rejected')">❌ Reject</button>
        <button class="btn sm sec" onclick="adminDecision('${t.id}','done')">✔ Mark Done</button>
      </div>
    </div>`:''}</div>`;
}

async function adminDecision(id, status){
  const note=($('supAdminNote')||{}).value||'';
  await api('/api/support/tickets/'+id,{method:'PATCH',body:JSON.stringify({status,adminNote:note||undefined})});
  toast('Ticket updated');
  viewSupport();
}

loadAccts();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW:', e));
  });
}
</script>
</body>
</html>
